            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button className="btn bs w100" style={{justifyContent:"flex-start",gap:12,padding:"14px 16px"}} onClick={exportText}>
                <span style={{fontSize:22}}>📋</span>
                <div style={{textAlign:"right"}}>
                  <div style={{fontWeight:700,fontSize:13}}>טקסט להעתקה</div>
                  <div style={{fontSize:11,color:"var(--cl)"}}>מוכן לווטסאפ / מייל</div>
                </div>
              </button>
              <button className="btn bs w100" style={{justifyContent:"flex-start",gap:12,padding:"14px 16px"}} onClick={exportCSV}>
                <span style={{fontSize:22}}>📊</span>
                <div style={{textAlign:"right"}}>
                  <div style={{fontWeight:700,fontSize:13}}>CSV לאקסל</div>
                  <div style={{fontSize:11,color:"var(--cl)"}}>הורדת קובץ לעיבוד בגיליון</div>
                </div>
              </button>
              <button className="btn bs w100" style={{justifyContent:"flex-start",gap:12,padding:"14px 16px"}} onClick={exportPrint}>
                <span style={{fontSize:22}}>🖨️</span>
                <div style={{textAlign:"right"}}>
                  <div style={{fontWeight:700,fontSize:13}}>הדפסה / PDF</div>
                  <div style={{fontSize:11,color:"var(--cl)"}}>פתח חלון הדפסה / שמור כ-PDF</div>
                </div>
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PatSearch({patients,value,onSelect,onAddNew,presetWard,org}){
  const [q,setQ]=useState("");
  const [open,setOpen]=useState(false);
  const [showNew,setShowNew]=useState(false);

  // טופס מטופל חדש — מאותחל עם האגף שנבחר כבר
  const initNp=()=>({name:"",note:"",gender:"נקבה",
    spaceId:presetWard?.spaceId||"",
    deptId:presetWard?.deptId||"",
    wardId:presetWard?.wardId||"",
    room:"",ts:"waiting",traits:[]});
  const [np,setNp]=useState(initNp);

  // label מוכן לאגף שנבחר
  const presetLabel = presetWard?.wardId && org
    ? wardLabel(org, presetWard.wardId)
    : null;
  const ref=useRef(null);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  const sel=patients.find(p=>String(p.id)===String(value));
  if(sel) return(
    <div style={{display:"flex",alignItems:"center",gap:7,padding:"10px 12px",background:"#e8f5ee",borderRadius:10,border:"2px solid #4caf73"}}>
      <span style={{flex:1,fontWeight:700,fontSize:13}}>{sel.name}{sel.note&&` (${sel.note})`}</span>
      <button className="btn bg_ bxs" onClick={()=>onSelect("")} style={{color:"var(--ro)"}}>✕</button>
    </div>
  );
  const list=patients.filter(p=>p.hosp!=="ended"&&(q===""||p.name.includes(q)));
  const saveNew=()=>{
    if(!np.name.trim()) return;
    const now=new Date().toISOString();
    const newP={
      ...np, id:Date.now(), traits:np.traits||[],
      hosp: np.wardId||np.spaceId||"hemato_trans", // backward compat
      statusLog:[{date:now.split("T")[0],from:null,to:np.ts,note:"קליטה ראשונה"}],
      admissions:[{id:`a${Date.now()}`,from:now.split("T")[0],to:null,
        spaceId:np.spaceId, deptId:np.deptId, wardId:np.wardId, room:np.room}],
    };
    onAddNew(newP);
    onSelect(String(newP.id));
    setShowNew(false);
    setNp(initNp());
  };
  const toggleTrait=t=>setNp(p=>({...p,traits:(p.traits||[]).includes(t)?(p.traits||[]).filter(r=>r!==t):[...(p.traits||[]),t]}));
  return(
    <div ref={ref}>
      <div className="srwrap">
        <span className="sricon"><Ico n="srch" s={14}/></span>
        <input className="fi" style={{paddingRight:36}} placeholder="חפש.י שם..." value={q}
          onChange={e=>{setQ(e.target.value);setOpen(true);setShowNew(false);}}
          onFocus={()=>{setOpen(true);setShowNew(false);}}/>
        {open&&!showNew&&(
          <div className="srres">
            {list.map(p=>(
              <div key={p.id} className="sritem" onClick={()=>{onSelect(String(p.id));setQ("");setOpen(false);}}>
                <span style={{fontWeight:700}}>{p.name}</span>
                {p.note&&<span style={{color:"var(--cl)",fontSize:11}}>· {p.note}</span>}
                <TBadge v={p.ts}/>
              </div>
            ))}
            <div className="sritem" style={{color:"var(--gd)",fontWeight:700,borderTop:"1px solid var(--bd)"}}
              onClick={()=>{setOpen(false);setShowNew(true);}}>
              <Ico n="plus" s={13} c="var(--gd)"/> מטופל.ת חדש.ה
            </div>
          </div>
        )}
      </div>
      {showNew&&(
        <div style={{background:"#f0f8f6",borderRadius:10,padding:"12px",marginTop:8,border:"2px solid var(--teal)"}}>
          <div style={{fontWeight:700,fontSize:12,color:"var(--teal)",marginBottom:8}}>➕ מטופל.ת חדש.ה</div>
          <div className="ibox igold" style={{marginBottom:10,fontSize:11}}>🔒 שם פרטי בלבד</div>

          {/* אגף — מוצג אוטומטית מהבחירה הקודמת */}
          {presetLabel&&(
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12,padding:"7px 11px",background:"white",borderRadius:8,border:"1px solid var(--bd)"}}>
              <span style={{fontSize:11,color:"var(--cl)"}}>🏥 אגף:</span>
              <span style={{fontSize:12,fontWeight:700,color:"var(--gd)"}}>{presetLabel}</span>
            </div>
          )}

          <div className="fg"><label className="fl">שם פרטי *</label>
            <input className="fi" value={np.name} onChange={e=>setNp({...np,name:e.target.value})} placeholder="שם פרטי" autoFocus/>
          </div>
          <div className="fg"><label className="fl">הערה מזהה</label>
            <input className="fi" value={np.note} onChange={e=>setNp({...np,note:e.target.value})} placeholder='"כובע כחול"'/>
          </div>
          <div className="fr2">
            <div className="fg"><label className="fl">מין</label>
              <select className="fi" value={np.gender} onChange={e=>setNp({...np,gender:e.target.value})}>
                <option>נקבה</option><option>זכר</option><option>אחר</option>
              </select>
            </div>
            <div className="fg"><label className="fl">חדר (אופציונלי)</label>
              <input className="fi" value={np.room} onChange={e=>setNp({...np,room:e.target.value})} placeholder="מס׳"/>
            </div>
          </div>
          <div className="fg">
            <div className="splbl">מאפיינים (לא חובה)</div>
            <div className="spg">
              {[["יוצא.ת אתיופיה","#e8d5f5","#6b3a8a"],["מגזר חרדי","#fff8e1","#7a5c1a"],["מגזר ערבי","#e8f5ee","#2d7a4a"]].map(([t,bg,color])=>{
                const sel=(np.traits||[]).includes(t);
                return <div key={t} className="sp" style={sel?{background:bg,color,borderColor:color}:{}} onClick={()=>toggleTrait(t)}>{t}</div>;
              })}
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button className="btn bs bsm" style={{flex:1}} onClick={()=>setShowNew(false)}>ביטול</button>
            <button className="btn bp bsm" style={{flex:2}} disabled={!np.name.trim()} onClick={saveNew}>הוסף וסמן ✓</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ShiftPage({user,org,patients,setPatients,shifts,setShifts,treatments,setTreatments,toast}){
  const [step,setStep]=useState(1);
  const [shift,setShift]=useState({therapist:user,date:new Date().toISOString().split("T")[0],start:"",end:""});
  const [txs,setTxs]=useState([]);
  // refs: array of {id, pat, ward, note} — patients referred but not visited
  const [refs,setRefs]=useState([]);
  const [savedShiftId,setSavedShiftId]=useState(null);
  const [done,setDone]=useState(false);
  const [copied,setCopied]=useState(false);

  const dur=()=>{if(!shift.start||!shift.end||shift.end<=shift.start)return null;const [sh,sm]=shift.start.split(":").map(Number);const [eh,em]=shift.end.split(":").map(Number);const m=(eh*60+em)-(sh*60+sm);return `${Math.floor(m/60)}:${String(m%60).padStart(2,"0")} שע׳`;};

  const addTx=()=>setTxs(t=>[...t,{id:Date.now(),pat:"",space:"s1",dept:"",ward:"",types:[],note:"",mins:30}]);
  const upd=(id,f,v)=>setTxs(t=>t.map(x=>x.id===id?{...x,[f]:v}:x));
  const rem=id=>setTxs(t=>t.filter(x=>x.id!==id));
  const valid=t=>t.pat&&t.space&&t.dept&&t.ward&&t.types?.length>0;
  const canNext=txs.length>0&&txs.every(valid);

  const addRef=()=>setRefs(r=>[...r,{id:Date.now(),space:"",dept:"",ward:"",pat:""}]);
  const updRef=(id,f,v)=>setRefs(r=>r.map(x=>x.id===id?{...x,[f]:v}:x));
  const remRef=id=>setRefs(r=>r.filter(x=>x.id!==id));

  // Build WhatsApp summary text
  const buildWA=(sid)=>{
    const dateStr=new Date(shift.date).toLocaleDateString("he-IL",{day:"numeric",month:"numeric"});
    let txt=`🌿 *משמרת שפת הסרטן*\n`;
    txt+=`*${shift.therapist}* | ${dateStr} | ${shift.start}–${shift.end}\n\n`;
    if(txs.length>0){
      txt+=`✅ *ביקרתי:*\n`;
      txs.forEach(t=>{
        const p=patients.find(x=>String(x.id)===String(t.pat));
        const name=p?.name||t.pat;
        const room=p?.room?` – חדר ${p.room}`:"";
        const ward=WARD_L[t.ward]?.split("–")[1]?.trim()||WARD_L[t.ward]||"";
        const types=(t.types||[]).join(", ");
        txt+=`• ${name}${room} (${ward}, ${types})\n`;
      });
    }
    if(refs.length>0){
      txt+=`\n⏳ *ממתינים לטיפול (לא הספקתי):*\n`;
      refs.forEach(r=>{
        const p=patients.find(x=>String(x.id)===String(r.pat));
        const name=p?.name||"—";
        const room=p?.room?` – חדר ${p.room}`:"";
        const ward=r.ward?(WARD_L[r.ward]?.split("–")[1]?.trim()||WARD_L[r.ward]||""):"";
        txt+=`• ${name}${room}${ward?` (${ward})`:""}\n`;
      });
    }
    return txt.trim();
  };

  const save=()=>{
    const now=new Date().toISOString();const sid=Date.now();
    // Save shift
    setShifts(s=>[{id:sid,therapist:user,date:shift.date,start:shift.start,end:shift.end,submittedAt:now},...s]);
    // Save treatments
    setTreatments(t=>[...txs.map((t2,i)=>{const p=patients.find(x=>String(x.id)===String(t2.pat));return{id:sid+i+1,shiftId:sid,patientId:p?.id||null,patientName:p?.name||t2.pat,therapist:user,date:shift.date,ward:t2.ward,types:t2.types,mins:t2.mins,note:t2.note,submittedAt:now};}), ...t]);
    // Save referrals as new patients (if new) or update status
    if(refs.length>0){
      setPatients(ps=>{
        let updated=[...ps];
        refs.forEach(r=>{
          if(!r.pat) return;
          const exists=updated.find(x=>String(x.id)===String(r.pat));
          if(exists){
            // update ward if changed, keep waiting status
            updated=updated.map(p=>String(p.id)===String(r.pat)?{...p,hosp:r.ward||p.hosp,ts:"waiting",statusLog:[...(p.statusLog||[]),{date:now.split("T")[0],from:p.ts,to:"waiting",note:`הפנייה ממשמרת ${shift.therapist}`}]}:p);
          } else {
            // new patient from referral
            const newP={id:Date.now()+Math.random(),name:r.pat,note:"",gender:"לא ידוע",traits:[],hosp:r.ward||"hemato_trans",room:"",ts:"waiting",statusLog:[{date:now.split("T")[0],from:null,to:"waiting",note:`הפנייה ממשמרת ${shift.therapist}`}],admissions:[{id:`ref${Date.now()}`,from:now.split("T")[0],to:null,hosp:r.ward||"hemato_trans",room:""}]};
            updated=[...updated,newP];
          }
        });
        return updated;
      });
    }
    setSavedShiftId(sid);
    toast("המשמרת נשמרה! ✨");
    setDone(true);
  };

  const copyWA=()=>{
    const txt=buildWA(savedShiftId);
    // יצירת textarea זמני – עובד על כל דפדפן ומובייל
    const ta=document.createElement("textarea");
    ta.value=txt;
    ta.setAttribute("readonly","");
    ta.style.cssText="position:fixed;top:0;left:0;opacity:0;font-size:16px;";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    // iOS
    const range=document.createRange();
    range.selectNodeContents(ta);
    const sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    ta.setSelectionRange(0,99999);
    try{
      document.execCommand("copy");
      setCopied(true);
      setTimeout(()=>setCopied(false),2500);
    }catch(e){
      // fallback: open share sheet on mobile
      if(navigator.share){navigator.share({text:txt});}
    }
    document.body.removeChild(ta);
  };

  const reset=()=>{setStep(1);setShift({therapist:user,date:new Date().toISOString().split("T")[0],start:"",end:""});setTxs([]);setRefs([]);setDone(false);setSavedShiftId(null);setCopied(false);};

  // Done screen
  if(done){
    const waText=buildWA(savedShiftId);
    return(
      <div style={{padding:"0 0 20px"}}>
        <div style={{textAlign:"center",padding:"32px 20px 24px"}}>
          <div style={{fontSize:48,marginBottom:10}}>✅</div>
          <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>המשמרת נשמרה!</div>
          <div style={{fontSize:13,color:"var(--cl)"}}>{txs.length} טיפולים{refs.length>0?` · ${refs.length} הפניות`:""}  תועדו</div>
        </div>
        {/* WhatsApp summary */}
        <div style={{background:"white",borderRadius:14,border:"1px solid var(--bd)",overflow:"hidden",marginBottom:14}}>
          <div style={{background:"#25D366",padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>💬</span>
            <span style={{fontWeight:700,fontSize:13,color:"white"}}>סיכום לקבוצת הווטסאפ</span>
          </div>
          <div style={{padding:"14px",direction:"rtl"}}>
            <pre style={{fontFamily:"'Heebo',sans-serif",fontSize:13,lineHeight:1.7,color:"var(--ch)",whiteSpace:"pre-wrap",wordBreak:"break-word",margin:0,background:"var(--cr)",borderRadius:9,padding:"12px 14px",border:"1px solid var(--bd)"}}>{waText}</pre>
            <button className="btn w100" style={{marginTop:12,background:copied?"#25D366":"#25D366",color:"white",fontWeight:700,fontSize:14,borderRadius:11,padding:"12px"}} onClick={copyWA}>
              {copied?"✓ הועתק!":"📋 העתק לווטסאפ"}
            </button>
          </div>
        </div>
        <button className="btn bs w100" onClick={reset}>דיווח משמרת חדשה</button>
      </div>
    );
  }

  const STEPS=["פרטים","דיווח","סיכום"];
  return(
    <div>
      <div className="ph"><div><div className="pt">דיווח משמרת</div><div className="pst">שלב {step}/3</div></div></div>
      <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:18}}>
        {STEPS.map((lb,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:4}}>
          <div style={{width:22,height:22,borderRadius:"50%",background:step>i+1?"var(--g)":step===i+1?"var(--gd)":"var(--bd)",color:step>=i+1?"white":"var(--cl)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>{step>i+1?"✓":i+1}</div>
          <span style={{fontSize:11,fontWeight:step===i+1?700:400,color:step===i+1?"var(--ch)":"var(--cl)"}}>{lb}</span>
          {i<2&&<div style={{width:14,height:2,background:step>i+1?"var(--g)":"var(--bd)"}}/>}
        </div>))}
      </div>
      <div className="card">
        {step===1&&<>
          <div className="fg"><label className="fl">מטפל.ת</label><select className="fi" value={shift.therapist} onChange={e=>setShift({...shift,therapist:e.target.value})}>{THERAPISTS.map(t=><option key={t}>{t}</option>)}</select></div>
          <div className="fg"><label className="fl">תאריך</label><input type="date" className="fi" value={shift.date} onChange={e=>setShift({...shift,date:e.target.value})}/></div>
          <div className="fr2">
            <div className="fg"><label className="fl">כניסה</label><input type="time" className="fi" value={shift.start} onChange={e=>setShift({...shift,start:e.target.value})}/></div>
            <div className="fg"><label className="fl">יציאה</label><input type="time" className="fi" value={shift.end} onChange={e=>setShift({...shift,end:e.target.value})}/></div>
          </div>
          {dur()&&<div className="ibox igreen" style={{marginBottom:12}}>⏱ {dur()}</div>}
          <button className="btn bp w100" disabled={!shift.start||!shift.end||shift.end<=shift.start} onClick={()=>setStep(2)}>המשך ←</button>
        </>}

        {step===2&&<>
          {/* ── TREATMENTS ── */}
          <div style={{fontWeight:700,fontSize:13,color:"var(--ch)",marginBottom:10}}>💚 טיפולים שביצעתי</div>
          {txs.length===0&&<div style={{textAlign:"center",padding:"14px 0 18px",color:"var(--cl)",fontSize:13}}><div style={{fontSize:26}}>💆</div><div style={{marginTop:4}}>הוסף.י טיפולים שביצעת</div></div>}
          {txs.map((t,i)=>(

function PaymentsPage({role,user,payments,setPayments,budget,setBudget,shifts,toast}){
  const RATE=95;
  const visible=role==="therapist"?payments.filter(p=>p.therapist===user):payments;

  const prevMonthLabel=(()=>{const now=new Date();const d=new Date(now.getFullYear(),now.getMonth()-1,1);return d.toLocaleDateString("he-IL",{month:"long",year:"numeric"});})();
  const prevMonthShifts=(()=>{const now=new Date();const y=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();const m=now.getMonth()===0?11:now.getMonth()-1;return shifts.filter(s=>{if(s.therapist!==user)return false;const d=new Date(s.date);return d.getFullYear()===y&&d.getMonth()===m;});})();
  const shiftRawHours=s=>{if(!s.start||!s.end||s.end<=s.start)return 0;const[sh,sm]=s.start.split(":").map(Number);const[eh,em]=s.end.split(":").map(Number);return((eh*60+em)-(sh*60+sm))/60;};
  const shiftHours=s=>Math.max(3,shiftRawHours(s));
  const totalHours=prevMonthShifts.reduce((a,s)=>a+shiftHours(s),0);
  const totalAmount=Math.round(totalHours*RATE);

  const [showReq,setShowReq]=useState(false);
  const [showBudgetEdit,setShowBudgetEdit]=useState(false);
  const [budgetDelta,setBudgetDelta]=useState("");
  const [budgetNote,setBudgetNote]=useState("");
  const [budgetSign,setBudgetSign]=useState("+");
  const [showTransfer,setShowTransfer]=useState(false);
  const [docType,setDocType]=useState("");
  const [docFile,setDocFile]=useState(null);
  const [transferDone,setTransferDone]=useState(false);
  const [uploadingFor,setUploadingFor]=useState(null);
  const [recFile,setRecFile]=useState(null);

  const submitReq=()=>{
    if(!docType||!docFile)return;
    setPayments(p=>[{id:Date.now(),therapist:user,month:prevMonthLabel,hours:Math.round(totalHours*10)/10,amount:totalAmount,status:"request",docType,docFile:docFile.name},...p]);
    setShowReq(false);setDocType("");setDocFile(null);toast("דרישת תשלום הוגשה ✓");
  };
  const submitRec=(payId)=>{
    if(!recFile)return;
    setPayments(ps=>ps.map(p=>p.id===payId?{...p,status:"receipt_sent",receiptFile:recFile.name}:p));
    setUploadingFor(null);setRecFile(null);toast("קבלה הועלתה ✓");
  };

  const approvedForTransfer=payments.filter(p=>p.status==="approved");
  const transferTotal=approvedForTransfer.reduce((a,p)=>a+p.amount,0);
  const doTransfer=()=>{setPayments(ps=>ps.map(p=>p.status==="approved"?{...p,status:"transferred"}:p));setTransferDone(true);toast("עודכן ✓");};
  const copyTransferReport=()=>{
    const lines=approvedForTransfer.map(p=>`${p.therapist} | ${p.month} | ${p.hours} שע׳ | ₪${p.amount.toLocaleString()}`).join("\n");
    const txt=`דוח העברות לבנק — ${new Date().toLocaleDateString("he-IL")}\n${"─".repeat(36)}\n${lines}\n${"─".repeat(36)}\nסה״כ: ₪${transferTotal.toLocaleString()}`;
    const ta=document.createElement("textarea");ta.value=txt;ta.setAttribute("readonly","");ta.style.cssText="position:fixed;top:0;left:0;opacity:0;font-size:16px;";document.body.appendChild(ta);ta.focus();ta.select();const r=document.createRange();r.selectNodeContents(ta);const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);ta.setSelectionRange(0,99999);try{document.execCommand("copy");toast("הועתק ✓");}catch(e){}document.body.removeChild(ta);
  };

  const STEPS=[{k:"request",l:"ממתין לאישור"},{k:"approved",l:"דרישה מאושרת"},{k:"transferred",l:"תשלום עבר"},{k:"receipt_sent",l:"קבלה הועלתה"},{k:"receipt_approved",l:"קבלה מאושרת"}];
  const stepIdx=st=>STEPS.findIndex(s=>s.k===st);

    const cur=stepIdx(status);
    return(
      <div style={{display:"flex",alignItems:"flex-start",marginTop:10,marginBottom:4}}>

              <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:"0 0 auto"}}>
                <div style={{width:18,height:18,borderRadius:"50%",background:done?"var(--g)":"var(--bd)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"white"}}>
                  {done?"✓":""}
                </div>
                <div style={{fontSize:8,color:active?"var(--gd)":done?"var(--g)":"var(--sl)",fontWeight:active?700:400,marginTop:2,textAlign:"center",maxWidth:44,lineHeight:1.2}}>{s.l}</div>
              </div>
              {i<STEPS.length-1&&<div style={{flex:1,height:2,background:i<cur?"var(--g)":"var(--bd)",margin:"0 2px",marginBottom:16}}/>}

                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}><span style={{color:"var(--cl)"}}>תעריף</span><span style={{fontWeight:700}}>₪{RATE} / שעה</span></div>
                  <div style={{height:1,background:"var(--bd)",margin:"8px 0"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:15}}><span style={{fontWeight:700}}>סה״כ</span><span style={{fontWeight:800,color:"var(--gd)"}}>₪{totalAmount.toLocaleString()}</span></div>
                </div>
              </>
            }
            <div className="fg"><div className="splbl">סוג המסמך *</div><div className="spg" style={{marginBottom:10}}>{[["demand","דרישת תשלום"],["invoice","חשבונית עסקה"]].map(([v,l])=><div key={v} className={`sp ${docType===v?"s-waiting":""}`} onClick={()=>setDocType(v)}>{l}</div>)}</div></div>
            <div className="fg"><label className="fl">העלאת מסמך *</label>
              <label style={{display:"block",padding:"14px",border:"2px dashed var(--bd)",borderRadius:10,textAlign:"center",cursor:"pointer",background:docFile?"#e8f5ee":"white",borderColor:docFile?"#4caf73":"var(--bd)"}}>
                <input type="file" accept=".pdf,.jpg,.jpeg,.png" style={{display:"none"}} onChange={e=>setDocFile(e.target.files[0])}/>
                {docFile?<><div style={{fontSize:18,marginBottom:4}}>✅</div><div style={{fontSize:13,fontWeight:700,color:"#2d7a4a"}}>{docFile.name}</div></>:<><div style={{fontSize:22,marginBottom:4}}>📎</div><div style={{fontSize:13,color:"var(--cl)"}}>לחץ.י להעלאת קובץ</div></>}
              </label>
            </div>
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <button className="btn bs" style={{flex:1}} onClick={()=>setShowReq(false)}>ביטול</button>
              <button className="btn bp" style={{flex:2}} disabled={!docType||!docFile||prevMonthShifts.length===0} onClick={submitReq}>הגש דרישה ✓</button>
            </div>
          </div>
        </div>
      )}

      {showTransfer&&(
        <div className="overlay" onClick={()=>setShowTransfer(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mhead"><div className="mtitle">🏦 דוח העברה לבנק</div><button style={{background:"none",border:"none",fontSize:20,color:"var(--cl)",cursor:"pointer"}} onClick={()=>setShowTransfer(false)}>✕</button></div>
            <div style={{background:"var(--cr)",borderRadius:10,border:"1px solid var(--bd)",overflow:"hidden",marginBottom:14}}>
              <div style={{padding:"10px 14px",background:"var(--ch)",color:"white",fontSize:12,fontWeight:700}}>דרישות מאושרות · {new Date().toLocaleDateString("he-IL")}</div>
              {approvedForTransfer.map((p,i)=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:i<approvedForTransfer.length-1?"1px solid var(--bd)":"none",background:i%2===0?"white":"var(--cr)"}}>
                  <div><div style={{fontWeight:700,fontSize:13}}>{p.therapist}</div><div style={{fontSize:11,color:"var(--cl)"}}>{p.month} · {p.hours} שע׳</div></div>
                  <div style={{fontWeight:800,fontSize:14,color:"var(--gd)"}}>₪{p.amount.toLocaleString()}</div>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",padding:"12px 14px",background:"var(--ch)",color:"white"}}>
                <span style={{fontWeight:700,fontSize:13}}>סה״כ</span><span style={{fontWeight:800,fontSize:15}}>₪{transferTotal.toLocaleString()}</span>
              </div>
            </div>
            <button className="btn w100 bs" style={{marginBottom:10,fontSize:13}} onClick={copyTransferReport}>📋 העתק דוח</button>
            {!transferDone
              ?<button className="btn bp w100" style={{fontSize:14,padding:"13px"}} onClick={doTransfer}>✅ סמן הכל כ"תשלום עבר"</button>
              :<div className="ibox igreen" style={{textAlign:"center",fontWeight:700}}>✓ עודכן</div>
            }
          </div>
        </div>
      )}

      {/* ── מודל: עדכון תקציב (מנהל) ── */}
      {showBudgetEdit&&(
        <div className="overlay" onClick={()=>setShowBudgetEdit(false)}>
          <div className="modal" style={{maxWidth:340}} onClick={e=>e.stopPropagation()}>
            <div className="mhead">
              <div className="mtitle">✏️ עדכון תקציב</div>
              <button style={{background:"none",border:"none",fontSize:20,color:"var(--cl)",cursor:"pointer"}} onClick={()=>setShowBudgetEdit(false)}>✕</button>
            </div>
            <div style={{background:"var(--cr)",borderRadius:10,padding:"12px",border:"1px solid var(--bd)",marginBottom:14,textAlign:"center"}}>
              <div style={{fontSize:11,color:"var(--cl)",marginBottom:4}}>תקציב נוכחי</div>
              <div style={{fontWeight:800,fontSize:22,color:"var(--gd)"}}>₪{budget.toLocaleString()}</div>
            </div>
            <div className="fg">
              <div className="splbl">פעולה</div>
              <div className="spg">
                {[["+","הוסף"],["−","הפחת"]].map(([s,l])=>(
                  <div key={s} className={`sp ${budgetSign===s?"s-waiting":""}`}
                    style={s==="−"&&budgetSign===s?{background:"var(--rol)",color:"#8a3a3a",borderColor:"#8a3a3a"}:{}}
                    onClick={()=>setBudgetSign(s)}>{s} {l}</div>
                ))}
              </div>
            </div>
            <div className="fg">
              <label className="fl">סכום (₪)</label>
              <input className="fi" type="number" min="0" value={budgetDelta} onChange={e=>setBudgetDelta(e.target.value)} placeholder="הכנס סכום..."/>
            </div>
            <div className="fg">
              <label className="fl">הערה</label>
              <input className="fi" value={budgetNote} onChange={e=>setBudgetNote(e.target.value)} placeholder='למשל: "תרומה מהקרן"'/>
            </div>
            {budgetDelta&&<div style={{background:"var(--cr)",borderRadius:8,padding:"8px 12px",fontSize:12,marginBottom:12,border:"1px solid var(--bd)"}}>
              תקציב חדש: <strong>₪{(budgetSign==="+"?budget+Number(budgetDelta):Math.max(0,budget-Number(budgetDelta))).toLocaleString()}</strong>
            </div>}
            <div style={{display:"flex",gap:8}}>
              <button className="btn bs" style={{flex:1}} onClick={()=>{setShowBudgetEdit(false);setBudgetDelta("");setBudgetNote("");setBudgetSign("+");}}>ביטול</button>
              <button className="btn bp" style={{flex:2}} disabled={!budgetDelta||Number(budgetDelta)<=0} onClick={()=>{
                const delta=Number(budgetDelta);
                setBudget(b=>budgetSign==="+"?b+delta:Math.max(0,b-delta));
                setShowBudgetEdit(false);setBudgetDelta("");setBudgetNote("");setBudgetSign("+");
                toast(`תקציב עודכן ${budgetSign}₪${delta.toLocaleString()} ✓`);
              }}>שמור</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function HistoryPage({user,shifts,treatments}){
  const myShifts=shifts.filter(s=>s.therapist===user).sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt));
  return(
    <div>
      <div className="ph"><div><div className="pt">הדיווחים שלי</div></div></div>
      {myShifts.length===0&&<div className="empty">אין דיווחים עדיין</div>}
      {myShifts.map(sh=>{
        const txs=treatments.filter(t=>t.shiftId===sh.id);
        return(
          <div key={sh.id} style={{background:"white",borderRadius:11,padding:"12px 14px",marginBottom:9,border:"1px solid var(--bd)"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <div><div style={{fontWeight:700,fontSize:13}}>📅 {sh.date}</div><div style={{fontSize:11,color:"var(--cl)"}}>{sh.start}–{sh.end} · {txs.length} טיפולים · לפני {daysDiff(sh.submittedAt)} ימים</div></div>
              <span style={{fontSize:10,color:canEditShift(sh.submittedAt)?"#7a5c1a":"var(--sl)",background:canEditShift(sh.submittedAt)?"var(--gol)":"var(--sll)",padding:"2px 7px",borderRadius:20,alignSelf:"flex-start"}}>{canEditShift(sh.submittedAt)?"ניתן לעריכה":"🔒"}</span>
            </div>
            {txs.length>0&&<div style={{borderTop:"1px solid var(--bd)",paddingTop:7}}>{txs.map(tx=><div key={tx.id} style={{fontSize:11,color:"var(--cl)",marginBottom:2}}>💚 {tx.patientName} · {(tx.types||[tx.type]).join(", ")} · {tx.mins} דק׳</div>)}</div>}
          </div>
        );
      })}
    </div>
  );
}

// ─── SETTINGS PAGE ────────────────────────────────────────
function SettingsPage({org, setOrg, treatments, toast}){
  const [tab, setTab] = useState("structure");
  const [showAddSpace, setShowAddSpace] = useState(false);
  const [showAddDept,  setShowAddDept]  = useState(false);
  const [showAddWard,  setShowAddWard]  = useState(false);
  const [showAddUser,  setShowAddUser]  = useState(false);
  const [newSpaceName, setNewSpaceName] = useState("");
  const [newDept, setNewDept] = useState({name:"", spaceId:""});
  const [newWard, setNewWard] = useState({name:"", deptId:""});
  const [newUser, setNewUser] = useState({name:"", roles:["therapist"]});
  const [editUser, setEditUser] = useState(null);
  const [renaming, setRenaming] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);

  const uid = () => "id_" + Date.now() + Math.random().toString(36).slice(2,6);

  // בדיקה האם אגף/מחלקה/מרחב כבר שויך לטיפול
  // בודק wardId (שדה חדש) וגם ward (שדה ישן לאחור תאימות)
  const wardUsed  = wid => treatments.some(t => t.wardId===wid || t.ward===wid ||
    (()=>{const w=wardById(org,wid);return w&&(t.ward===wid);})()
  );
  const deptUsed  = did => org.wards.filter(w=>w.deptId===did).some(w=>wardUsed(w.id));
  const spaceUsed = sid => org.depts.filter(d=>d.spaceId===sid).some(d=>deptUsed(d.id));

  const requestDel = (type, id, name, usedFn) => {
    if(usedFn(id)){toast("⛔ לא ניתן למחוק — קיימים טיפולים משויכים");return;}
    setConfirmDel({type, id, name});
  };
  const execDel = () => {
    if(!confirmDel) return;
    const {type,id} = confirmDel;
    if(type==="spaces") setOrg(o=>({...o,spaces:o.spaces.filter(s=>s.id!==id)}));
    if(type==="depts")  setOrg(o=>({...o,depts:o.depts.filter(d=>d.id!==id)}));
    if(type==="wards")  setOrg(o=>({...o,wards:o.wards.filter(w=>w.id!==id)}));
    toast("נמחק ✓");setConfirmDel(null);
  };

  const saveRename = () => {
    if(!renaming||!renaming.value.trim()) return;
    setOrg(o=>({...o,
      [renaming.type]:o[renaming.type].map(x=>x.id===renaming.id?{...x,name:renaming.value.trim()}:x)
    }));
    setRenaming(null);toast("שם עודכן ✓");
  };

  // כפתור עיפרון — inline rename
  const RenameBtn = ({type, item}) => {
    if(renaming?.type===type && renaming?.id===item.id) return(
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <input className="fi fisn" style={{width:130}} value={renaming.value}
          onChange={e=>setRenaming({...renaming,value:e.target.value})}
          onKeyDown={e=>{if(e.key==="Enter")saveRename();if(e.key==="Escape")setRenaming(null);}}
          autoFocus/>
        <button className="btn bp bxs" onClick={saveRename}>✓</button>
        <button className="btn bs bxs" onClick={()=>setRenaming(null)}>✕</button>
      </div>
    );
    return(
      <button className="btn bs bxs" style={{fontSize:11}}
        onClick={()=>setRenaming({type, id:item.id, value:item.name})}>✏️ עריכה</button>
    );
  };

  return(
    <div>
      <div className="ph"><div><div className="pt">⚙️ הגדרות</div><div className="pst">ניהול מערכת</div></div></div>

      {/* חלון אישור מחיקה */}
      {confirmDel&&(
        <div className="overlay" onClick={()=>setConfirmDel(null)}>
          <div className="modal" style={{maxWidth:320}} onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",padding:"8px 0 16px"}}>
              <div style={{fontSize:40,marginBottom:10}}>🗑️</div>
              <div style={{fontWeight:800,fontSize:16,marginBottom:8}}>אישור מחיקה</div>
              <div style={{fontSize:13,color:"var(--cl)",marginBottom:20}}>
                האם למחוק את <strong>"{confirmDel.name}"</strong>?<br/>פעולה זו אינה ניתנת לביטול.
              </div>
              <div style={{display:"flex",gap:10}}>
                <button className="btn bs" style={{flex:1}} onClick={()=>setConfirmDel(null)}>ביטול</button>
                <button className="btn" style={{flex:1,background:"var(--ro)",color:"white",borderRadius:10,fontFamily:"Heebo",fontWeight:600,cursor:"pointer"}} onClick={execDel}>כן, מחק</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Tabs */}
      <div style={{display:"flex",gap:0,marginBottom:18,borderBottom:"1px solid var(--bd)"}}>
        {[["structure","מבנה אגפים"],["users","ניהול משתמשים"]].map(([v,l])=>(
          <div key={v} onClick={()=>setTab(v)}
            style={{padding:"9px 16px",fontWeight:600,fontSize:13,cursor:"pointer",
              color:tab===v?"var(--g)":"var(--cl)",
              borderBottom:tab===v?"2px solid var(--g)":"2px solid transparent",marginBottom:-1}}>
            {l}
          </div>
        ))}
      </div>

      {/* ── TAB: STRUCTURE ── */}
      {tab==="structure"&&(
        <div>
          {org.spaces.map(space=>(
            <div key={space.id} style={{background:"white",borderRadius:14,border:"1px solid var(--bd)",marginBottom:14,overflow:"hidden"}}>
              {/* Space header */}
              <div style={{background:"linear-gradient(135deg,var(--ch),var(--gd))",padding:"12px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                  <span style={{fontWeight:700,fontSize:14,color:"white"}}>🌍 {space.name}</span>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <RenameBtn type="spaces" item={space}/>
                    {!spaceUsed(space.id)
                      ?<button className="btn bxs" style={{background:"rgba(255,0,0,.25)",color:"#ffcccc",fontSize:11}}
                          onClick={()=>delSpace(space.id)}>🗑 מחק</button>
                      :<span style={{fontSize:10,color:"rgba(255,255,255,.4)"}}>🔒 משויכים טיפולים</span>
                    }
                  </div>
                </div>
              </div>

              {/* Depts */}
              <div style={{padding:"12px 14px"}}>
                {getDepts(org,space.id).map(dept=>(
                  <div key={dept.id} style={{marginBottom:14,background:"var(--cr)",borderRadius:10,padding:"10px 12px",border:"1px solid var(--bd)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
                      <span style={{fontWeight:700,fontSize:13,color:"var(--gd)"}}>🏥 {dept.name}</span>
                      <div style={{display:"flex",gap:5,alignItems:"center"}}>
                        <RenameBtn type="depts" item={dept}/>
                        {!deptUsed(dept.id)
                          ?<button className="btn bxs" style={{background:"var(--rol)",color:"#8a3a3a",fontSize:11}}
                              onClick={()=>delDept(dept.id)}>🗑 מחק</button>
                          :<span style={{fontSize:10,color:"var(--sl)"}}>🔒</span>
                        }
                      </div>
                    </div>

                    {/* Wards */}
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {getWards(org,dept.id).map(ward=>(
                        <div key={ward.id} style={{background:"white",borderRadius:8,padding:"6px 10px",border:"1px solid var(--bd)",display:"flex",alignItems:"center",gap:6}}>
                          {renaming?.type==="wards"&&renaming?.id===ward.id
                            ?<div style={{display:"flex",gap:4,alignItems:"center"}}>
                              <input className="fi fisn" style={{width:110}} value={renaming.value}
                                onChange={e=>setRenaming({...renaming,value:e.target.value})}
                                onKeyDown={e=>{if(e.key==="Enter")saveRename();if(e.key==="Escape")setRenaming(null);}}
                                autoFocus/>
                              <button className="btn bp bxs" onClick={saveRename}>✓</button>
                              <button className="btn bs bxs" onClick={()=>setRenaming(null)}>✕</button>
                            </div>
                            :<>
                              <span style={{fontSize:12,fontWeight:600}}>{ward.name}</span>
                              <button style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"var(--cl)",padding:0}}
                                onClick={()=>setRenaming({type:"wards",id:ward.id,value:ward.name})}>✏️</button>
                              {!wardUsed(ward.id)
                                ?<button style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"var(--ro)",padding:0}}
                                    onClick={()=>delWard(ward.id)}>🗑</button>
                                :<span style={{fontSize:10,color:"var(--sl)"}}>🔒</span>
                              }
                            </>
                          }
                        </div>
                      ))}
                      {/* Add ward inline */}
                      {showAddWard&&newWard.deptId===dept.id
                        ?<div style={{display:"flex",gap:5,alignItems:"center",width:"100%",marginTop:4}}>
                          <input className="fi fisn" style={{flex:1}} placeholder="שם אגף חדש" value={newWard.name}
                            onChange={e=>setNewWard({...newWard,name:e.target.value})}
                            onKeyDown={e=>{if(e.key==="Enter"&&newWard.name.trim()){
                              setOrg(o=>({...o,wards:[...o.wards,{id:uid(),deptId:dept.id,name:newWard.name.trim(),room:false}]}));
                              setNewWard({name:"",deptId:""});setShowAddWard(false);toast("אגף נוסף ✓");
                            }}}
                            autoFocus/>
                          <button className="btn bp bxs" disabled={!newWard.name.trim()} onClick={()=>{
                            setOrg(o=>({...o,wards:[...o.wards,{id:uid(),deptId:dept.id,name:newWard.name.trim(),room:false}]}));
                            setNewWard({name:"",deptId:""});setShowAddWard(false);toast("אגף נוסף ✓");
                          }}>הוסף</button>
                          <button className="btn bs bxs" onClick={()=>setShowAddWard(false)}>ביטול</button>
                        </div>
                        :<button className="btn bs bxs" style={{fontSize:11,borderStyle:"dashed"}}
                          onClick={()=>{setShowAddWard(true);setNewWard({name:"",deptId:dept.id});}}>+ אגף</button>
                      }
                    </div>
                  </div>
                ))}

                {/* Add dept */}
                {showAddDept&&newDept.spaceId===space.id
                  ?<div style={{display:"flex",gap:5,alignItems:"center",marginTop:4}}>
                    <input className="fi fisn" style={{flex:1}} placeholder="שם מחלקה חדשה" value={newDept.name}
                      onChange={e=>setNewDept({...newDept,name:e.target.value})} autoFocus/>
                    <button className="btn bp bxs" disabled={!newDept.name.trim()} onClick={()=>{
                      setOrg(o=>({...o,depts:[...o.depts,{id:uid(),spaceId:space.id,name:newDept.name.trim()}]}));
                      setNewDept({name:"",spaceId:""});setShowAddDept(false);toast("מחלקה נוספה ✓");
                    }}>הוסף</button>
                    <button className="btn bs bxs" onClick={()=>setShowAddDept(false)}>ביטול</button>
                  </div>
                  :<button className="btn bs bsm" style={{marginTop:4,borderStyle:"dashed",width:"100%"}}
                    onClick={()=>{setShowAddDept(true);setNewDept({name:"",spaceId:space.id});}}>+ הוסף מחלקה</button>
                }
              </div>
            </div>
          ))}

          {/* Add space */}
          {showAddSpace
            ?<div style={{display:"flex",gap:8,marginTop:8}}>
              <input className="fi" style={{flex:1}} placeholder='שם מרחב חדש (למשל: "בית חולים שיבא")' value={newSpaceName}
                onChange={e=>setNewSpaceName(e.target.value)} autoFocus/>
              <button className="btn bp bsm" disabled={!newSpaceName.trim()} onClick={()=>{
                setOrg(o=>({...o,spaces:[...o.spaces,{id:uid(),name:newSpaceName.trim()}]}));
                setNewSpaceName("");setShowAddSpace(false);toast("מרחב נוסף ✓");
              }}>הוסף</button>
              <button className="btn bs bsm" onClick={()=>setShowAddSpace(false)}>ביטול</button>
            </div>
            :<button className="btn bp bsm" onClick={()=>setShowAddSpace(true)}><Ico n="plus" s={14}/> הוסף מרחב חדש</button>
          }
        </div>
      )}

      {/* ── TAB: USERS ── */}
      {tab==="users"&&(
        <div>
          {/* מטפלים בתהליך קליטה */}
          <div style={{background:"white",borderRadius:12,padding:"14px",border:"1px solid var(--bd)",marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>🌱 מטפלים.ות בתהליך קליטה</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button className="btn bs bxs" style={{fontSize:18,fontWeight:700,width:36,height:36}}
                onClick={()=>setOrg(o=>({...o,onboardingCount:Math.max(0,(o.onboardingCount||0)-1)}))}>−</button>
              <div style={{flex:1,textAlign:"center",fontSize:28,fontWeight:900,color:"var(--gd)"}}>{org.onboardingCount||0}</div>
              <button className="btn bs bxs" style={{fontSize:18,fontWeight:700,width:36,height:36}}
                onClick={()=>setOrg(o=>({...o,onboardingCount:(o.onboardingCount||0)+1}))}>+</button>
            </div>
            <div style={{fontSize:11,color:"var(--cl)",textAlign:"center",marginTop:6}}>מספר המתנדבים.ות בתהליך הצטרפות לצוות</div>
          </div>
          <div className="ibox igold" style={{marginBottom:14,fontSize:12}}>
            כל משתמש.ת יכול.ה להיות משויך.ת לתפקיד אחד או יותר. בכניסה יוצגו רק התפקידים המותרים.
          </div>
          {org.users.map((u,idx)=>(
            <div key={idx} style={{background:"white",borderRadius:11,padding:"12px 14px",marginBottom:8,border:"1px solid var(--bd)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:editUser?.idx===idx?10:0}}>
                <div style={{width:36,height:36,borderRadius:9,background:`hsl(${idx*37+140},40%,55%)`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:15,color:"white",flexShrink:0}}>{u.name[0]}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13}}>{u.name}</div>
                  <div style={{fontSize:11,color:"var(--cl)",marginTop:2}}>
                    {(u.roles||[u.role]).map(rv=>ROLES.find(r=>r.v===rv)?.l||rv).join(" · ")}
                  </div>
                </div>
                <button className="btn bs bxs" onClick={()=>setEditUser(editUser?.idx===idx?null:{idx,roles:[...(u.roles||[u.role])]})}>
                  {editUser?.idx===idx?"סגור":"ערוך"}
                </button>
              </div>
              {editUser?.idx===idx&&(
                <div style={{borderTop:"1px solid var(--bd)",paddingTop:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:"var(--cl)",marginBottom:8}}>תפקידים מותרים:</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                    {ROLES.map(r=>{
                      const sel=(editUser.roles||[]).includes(r.v);
                      return(
                        <div key={r.v} className={`sp ${sel?"s-waiting":""}`}
                          onClick={()=>setEditUser(eu=>({...eu,
                            roles:sel?eu.roles.filter(x=>x!==r.v):[...eu.roles,r.v]
                          }))}>
                          {sel?"✓ ":""}{r.l}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button className="btn bs bsm" style={{flex:1}} onClick={()=>setEditUser(null)}>ביטול</button>
                    <button className="btn bp bsm" style={{flex:2}} disabled={!editUser.roles?.length}
                      onClick={()=>{
                        setOrg(o=>({...o,users:o.users.map((x,i)=>i===idx?{...x,roles:editUser.roles,role:editUser.roles[0]}:x)}));
                        setEditUser(null);toast("תפקידים עודכנו ✓");
                      }}>שמור</button>
                  </div>
                </div>
              )}
            </div>
          ))}
          <div style={{height:1,background:"var(--bd)",margin:"16px 0"}}/>
          {showAddUser
            ?<div style={{background:"white",borderRadius:12,padding:"14px",border:"2px solid var(--g)"}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>➕ הוספת משתמש.ת</div>
              <div className="fg"><label className="fl">שם מלא *</label>
                <input className="fi" value={newUser.name} onChange={e=>setNewUser({...newUser,name:e.target.value})} placeholder="שם ושם משפחה"/>
              </div>
              <div className="fg">
                <label className="fl">תפקידים</label>
                <div className="spg">
                  {ROLES.map(r=>{
                    const roles=newUser.roles||[];
                    const sel=roles.includes(r.v);
                    return(
                      <div key={r.v} className={`sp ${sel?"s-waiting":""}`}
                        onClick={()=>setNewUser(nu=>{
                          const rls=nu.roles||[];
                          return{...nu,roles:sel?rls.filter(x=>x!==r.v):[...rls,r.v]};
                        })}>
                        {sel?"✓ ":""}{r.l}
                      </div>
                    );
                  })}
                </div>
              </div>
              <div className="ibox igold" style={{marginBottom:12,fontSize:11}}>
                🔒 בהמשך יתווסף: כניסה עם שם + 5 ספרות אחרונות של ת"ז
              </div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn bs" style={{flex:1}} onClick={()=>{setShowAddUser(false);setNewUser({name:"",roles:["therapist"]});}}>ביטול</button>
                <button className="btn bp" style={{flex:2}} disabled={!newUser.name.trim()||!newUser.roles?.length}
                  onClick={()=>{
                    setOrg(o=>({...o,users:[...o.users,{name:newUser.name.trim(),roles:newUser.roles,role:newUser.roles[0]}]}));
                    setShowAddUser(false);setNewUser({name:"",roles:["therapist"]});toast(`${newUser.name} נוסף.ה ✓`);
                  }}>הוסף למערכת</button>
              </div>
            </div>
            :<button className="btn bp bsm" onClick={()=>setShowAddUser(true)}><Ico n="plus" s={14}/> הוסף משתמש.ת</button>
          }
        </div>
      )}
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);
  const [loginName,setLN]=useState("");
  const [loginRole,setLR]=useState("therapist");
  const [page,setPage]=useState("dashboard");
  const [toastMsg,setToast]=useState(null);
  const [patients,setPatients]=useState(initPatients);
  const [treatments,setTreatments]=useState(initTreatments);
  const [shifts,setShifts]=useState(initShifts);
  const [payments,setPayments]=useState(initPayments);
  const [budget,setBudget]=useState(12000);
  const [org,setOrg]=useState(initOrgStructure);

  const toast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const logout=()=>{setUser(null);setLN("");setLR("therapist");setPage("dashboard");};

  if(!user) return(
    <div className="app">
      <div className="lswrap">
        <div className="lcard">
          <div className="llogo"><div style={{fontSize:48,marginBottom:8}}>🌿</div><h1>שפת הסרטן</h1><p>מערכת ניהול טיפולים</p></div>
          <div className="fg"><label className="fl">שם משתמש.ת</label>
            <select className="fi" value={loginName} onChange={e=>{setLN(e.target.value);setLR("");}}>
              <option value="">בחר.י שם...</option>
              {org.users.map(u=><option key={u.name} value={u.name}>{u.name}</option>)}
            </select>
          </div>
          {loginName&&(()=>{
            const u=org.users.find(x=>x.name===loginName);
            const roles=u?.roles||["therapist"];
            if(roles.length===1){
              if(loginRole!==roles[0]) setTimeout(()=>setLR(roles[0]),0);
              return <div className="ibox igreen" style={{marginBottom:12}}>תפקיד: {ROLES.find(r=>r.v===roles[0])?.l}</div>;
            }
            return(
              <div className="fg"><label className="fl">כניסה בתפקיד</label>
                <div className="spg">
                  {roles.map(rv=>(
                    <div key={rv} className={`sp ${loginRole===rv?"s-waiting":""}`}
                      onClick={()=>setLR(rv)}>
                      {ROLES.find(r=>r.v===rv)?.l||rv}
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}
          <button className="btn bp w100" disabled={!loginName||!loginRole}
            onClick={()=>{setUser({name:loginName,role:loginRole});setPage("dashboard");}}>
            כניסה למערכת
          </button>
          <div style={{marginTop:14,textAlign:"center",fontSize:11,color:"var(--cl)"}}>🔒 המערכת מאובטחת · פרטי מטופלים מוגנים</div>
        </div>
      </div>
    </div>
  );

  const role=user.role;
  const nav=[
    {id:"dashboard",l:"דשבורד",ic:"dash"},
    ...(role==="therapist"?[{id:"shift",l:"דיווח",ic:"shift"}]:[]),
    {id:"journal",l:"יומן",ic:"journal"},
    {id:"patients",l:"מטופלים",ic:"pats"},
    {id:"payments",l:"תשלומים",ic:"pay",badge:role==="admin"?payments.filter(p=>p.status==="request").length:0},
    ...(role==="admin"?[{id:"settings",l:"הגדרות",ic:"settings"}]:[]),
  ];

  const renderPage=()=>{
    if(page==="dashboard") return <Dashboard role={role} patients={patients} treatments={treatments} shifts={shifts} payments={payments} budget={budget} org={org}/>;
    if(page==="shift")     return <ShiftPage user={user.name} org={org} patients={patients} setPatients={setPatients} shifts={shifts} setShifts={setShifts} treatments={treatments} setTreatments={setTreatments} toast={toast}/>;
    if(page==="journal")   return <JournalPage treatments={treatments} org={org} role={role}/>;
    if(page==="patients")  return <PatientsPage patients={patients} setPatients={setPatients} treatments={treatments} toast={toast} org={org}/>;
    if(page==="payments")  return <PaymentsPage role={role} user={user.name} payments={payments} setPayments={setPayments} budget={budget} setBudget={setBudget} shifts={shifts} toast={toast}/>;
    if(page==="history")   return <HistoryPage user={user.name} shifts={shifts} treatments={treatments}/>;
    if(page==="settings")  return <SettingsPage org={org} setOrg={setOrg} treatments={treatments} toast={toast}/>;
    return null;
  };

  return(
    <div className="app">
      {toastMsg&&<Toast msg={toastMsg}/>}
      <div className="topbar">
        <div className="tb-logo">
          <div style={{width:26,height:26,background:"linear-gradient(135deg,#c47a8a,#8b3a4a)",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🌿</div>
          <h2>שפת הסרטן</h2>
        </div>
        <UserMenu user={user} onLogout={logout} onHistory={()=>setPage("history")}/>
      </div>
      <div className="main">{renderPage()}</div>
      <div className="mobnav">
        <div className="mobrow">
          {nav.map(item=>(
            <div key={item.id} className={`mobni ${page===item.id?"on":""}`} onClick={()=>setPage(item.id)}>
              <Ico n={item.ic} s={22}/>
              <span>{item.l}</span>
              {item.badge>0&&<span className="mobnb">{item.badge}</span>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
