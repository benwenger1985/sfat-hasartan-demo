<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>שפת הסרטן – מערכת ניהול טיפולים</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#8b3a4a;--gl:#c47a8a;--gd:#5c1a2a;
  --cr:#fdf6f0;--ch:#2c1a20;--cl:#5a3a42;
  --go:#c9a84c;--gol:#e8d5a3;
  --ro:#c47a7a;--rol:#f5dde0;
  --sk:#6b9eb8;--skl:#d0e8f5;
  --sl:#7a8a95;--sll:#e8edf0;
  --bd:#e8d0d5;--sh:rgba(92,26,42,.08);
  --pu:#9b7ec8;--pul:#ede4ff;
  --teal:#4a8a7a;--teall:#a8d0c8;
}
html,body{height:100%;direction:rtl;}
body{font-family:'Heebo',sans-serif;background:var(--cr);color:var(--ch);}
.app{font-family:'Heebo',sans-serif;background:var(--cr);min-height:100vh;color:var(--ch);direction:rtl;}
.lswrap{min-height:100vh;background:linear-gradient(160deg,#2c1a20 0%,#5c1a2a 50%,#8b3a4a 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.lcard{background:rgba(253,250,245,.97);border-radius:22px;padding:44px 36px;width:100%;max-width:400px;box-shadow:0 24px 56px rgba(0,0,0,.28);}
.llogo{text-align:center;margin-bottom:28px;}
.llogo h1{font-size:21px;font-weight:800;}
.llogo p{font-size:13px;color:var(--cl);margin-top:3px;}
.topbar{position:sticky;top:0;z-index:200;background:var(--ch);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.18);}
.tb-logo{display:flex;align-items:center;gap:8px;}
.tb-logo h2{font-size:13px;font-weight:800;color:white;}
.tnav{display:flex;align-items:center;gap:2px;padding:3px;background:rgba(255,255,255,.07);border-radius:10px;}
.tni{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.6);font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap;}
.tni:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.9);}
.tni.on{background:rgba(139,58,74,.4);color:#f5c0c8;}
.tnb{background:var(--ro);color:white;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;}
.tuser-wrap{position:relative;}
.tuser-btn{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:9px;cursor:pointer;background:rgba(255,255,255,.1);border:none;font-family:'Heebo',sans-serif;transition:all .15s;}
.tuser-btn:hover{background:rgba(255,255,255,.17);}
.tuser-name{font-size:12px;font-weight:700;color:white;}
.tuser-role{font-size:10px;color:rgba(255,255,255,.5);}
.tav{width:27px;height:27px;background:linear-gradient(135deg,#c47a8a,#8b3a4a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;}
.tdd{position:absolute;top:calc(100% + 6px);left:0;background:white;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.18);min-width:180px;z-index:300;overflow:hidden;border:1px solid var(--bd);}
.tdd-top{padding:10px 14px 8px;border-bottom:1px solid var(--bd);}
.tdd-item{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;font-size:13px;font-weight:500;color:var(--ch);transition:background .12s;}
.tdd-item:hover{background:var(--cr);}
.tdd-item.red{color:var(--ro);}
.tdd-sep{border:none;border-top:1px solid var(--bd);margin:0;}
.main{padding:16px 14px 90px;}
.ph{margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.pt{font-size:20px;font-weight:800;}
.pst{font-size:12px;color:var(--cl);margin-top:3px;}
.card{background:white;border-radius:14px;padding:16px;box-shadow:0 2px 10px var(--sh);border:1px solid var(--bd);}
.ct{font-size:13px;font-weight:700;margin-bottom:10px;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.scard{background:white;border-radius:14px;padding:14px 16px 12px;box-shadow:0 2px 10px var(--sh);border:1px solid var(--bd);position:relative;overflow:hidden;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.cgn::before{background:linear-gradient(90deg,var(--teal),var(--teall));}
.cgo::before{background:linear-gradient(90deg,var(--go),var(--gol));}
.csk::before{background:linear-gradient(90deg,var(--sk),var(--skl));}
.crs::before{background:linear-gradient(90deg,var(--ro),var(--rol));}
.sv{font-size:26px;font-weight:800;}
.slb{font-size:11px;color:var(--cl);margin-top:2px;font-weight:500;}
.wblock{background:white;border-radius:14px;padding:14px;box-shadow:0 2px 10px var(--sh);border:1px solid var(--bd);margin-bottom:12px;}
.wtitle{font-size:13px;font-weight:800;margin-bottom:10px;}
.wrow{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--cr);margin-bottom:6px;border:1px solid var(--bd);}
.wrow:last-child{margin-bottom:0;}
.pinit{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0;}
.pname{font-size:13px;font-weight:700;}
.pnote{font-size:11px;color:var(--cl);}
.proom{font-size:10px;background:white;border:1px solid var(--bd);padding:2px 6px;border-radius:4px;color:var(--cl);font-weight:600;}
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.bwt{background:var(--gol);color:#7a5c1a;}
.bnr{background:var(--rol);color:#8a3a3a;}
.bpd{background:#e8f5ee;color:#2d7a4a;}
.bap{background:var(--skl);color:#2a6a8a;}
.brq{background:var(--gol);color:#7a5c1a;}
.tw{overflow-x:auto;border-radius:10px;border:1px solid var(--bd);}
table{width:100%;border-collapse:collapse;}
thead{background:var(--cr);}
th{padding:8px 10px;font-size:10px;font-weight:700;color:var(--cl);text-align:right;border-bottom:1px solid var(--bd);white-space:nowrap;}
td{padding:9px 10px;font-size:12px;border-bottom:1px solid #f5f0e8;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.overlay{position:fixed;inset:0;background:rgba(44,26,32,.5);display:flex;align-items:flex-end;justify-content:center;z-index:1000;padding:0;backdrop-filter:blur(3px);}
.modal{background:white;border-radius:18px 18px 0 0;padding:24px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2);}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.mtitle{font-size:16px;font-weight:800;}
.file-modal{background:white;border-radius:18px 18px 0 0;padding:0;width:100%;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.2);}
.file-header{padding:18px 18px 14px;background:linear-gradient(160deg,#2c1a20,#8b3a4a);color:white;flex-shrink:0;}
.file-header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.file-avatar{width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0;}
.file-name{font-size:17px;font-weight:800;}
.file-meta{font-size:11px;opacity:.75;margin-top:2px;}
.file-tabs{display:flex;gap:0;padding:0 18px;background:white;border-bottom:1px solid var(--bd);flex-shrink:0;overflow-x:auto;}
.ftab{padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--cl);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.ftab.on{color:var(--g);border-bottom-color:var(--g);}
.file-body{flex:1;overflow-y:auto;padding:16px 18px;}
.timeline{position:relative;padding-right:20px;}
.timeline::before{content:'';position:absolute;right:6px;top:0;bottom:0;width:2px;background:var(--bd);}
.tl-item{position:relative;margin-bottom:14px;}
.tl-dot{position:absolute;right:-20px;top:4px;width:10px;height:10px;border-radius:50%;border:2px solid white;box-shadow:0 0 0 2px var(--bd);}
.tl-dot.green{background:var(--g);box-shadow:0 0 0 2px var(--g);}
.tl-dot.gold{background:var(--go);box-shadow:0 0 0 2px var(--go);}
.tl-dot.rose{background:var(--ro);box-shadow:0 0 0 2px var(--ro);}
.tl-dot.sky{background:var(--sk);box-shadow:0 0 0 2px var(--sk);}
.tl-dot.gray{background:var(--sl);box-shadow:0 0 0 2px var(--sl);}
.tl-date{font-size:10px;color:var(--cl);font-weight:600;margin-bottom:2px;}
.tl-card{background:var(--cr);border-radius:8px;padding:9px 11px;border:1px solid var(--bd);}
.tl-title{font-size:12px;font-weight:700;color:var(--ch);}
.tl-sub{font-size:11px;color:var(--cl);margin-top:2px;}
.tl-note{font-size:11px;color:var(--ch);margin-top:4px;font-style:italic;background:white;padding:4px 7px;border-radius:5px;border:1px solid var(--bd);}
.tl-therapist{font-size:10px;font-weight:700;color:var(--gd);margin-top:3px;}
.trow{background:var(--cr);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--bd);}
.trhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.tnum{font-size:12px;font-weight:700;color:var(--gd);}
.spg{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.sp{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--bd);background:white;color:var(--cl);transition:all .15s;-webkit-tap-highlight-color:transparent;}
.sp.s-hemato_trans{background:#e8f5ee;color:#2d7a4a;border-color:#4caf73;}
.sp.s-hemato_long{background:#d8f0f8;color:#1a6a8a;border-color:#5ba8c8;}
.sp.s-hemato_day{background:var(--skl);color:#2a6a8a;border-color:var(--sk);}
.sp.s-onco_long{background:var(--pul);color:#6b3a8a;border-color:var(--pu);}
.sp.s-onco_day{background:#ffe8f3;color:#8a3a6b;border-color:#d08ab8;}
.sp.s-ended{background:var(--sll);color:var(--sl);border-color:var(--sl);}
.sp.s-waiting{background:var(--gol);color:#7a5c1a;border-color:var(--go);}
.sp.s-palliative{background:#2c1a20;color:#f5c0c8;border-color:#8b3a4a;}
.sp.s-not_receiving{background:var(--rol);color:#8a3a3a;border-color:var(--ro);}
.splbl{font-size:11px;font-weight:700;color:var(--cl);letter-spacing:.4px;margin-bottom:5px;}
.srwrap{position:relative;}
.sricon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--cl);pointer-events:none;}
.srres{position:absolute;top:calc(100% + 4px);right:0;left:0;background:white;border:2px solid var(--g);border-radius:10px;box-shadow:0 8px 20px var(--sh);z-index:50;max-height:180px;overflow-y:auto;}
.sritem{padding:10px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:7px;-webkit-tap-highlight-color:transparent;}
.sritem:last-child{border-bottom:none;}
.srnew{color:var(--gd);font-weight:700;}
.rcard{background:var(--cr);border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--bd);}
.rrow{display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;margin-bottom:3px;}
.rrow:last-child{margin-bottom:0;}
.rlbl{color:var(--cl);font-weight:600;flex-shrink:0;}
.rval{font-weight:700;text-align:left;}
.budcard{background:linear-gradient(135deg,var(--ch),var(--gd));border-radius:14px;padding:18px;color:white;margin-bottom:14px;}
.budtitle{font-size:11px;font-weight:600;opacity:.7;margin-bottom:4px;}
.budamt{font-size:30px;font-weight:800;}
.budsub{font-size:11px;opacity:.6;margin-top:2px;}
.fg{margin-bottom:12px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--cl);margin-bottom:4px;letter-spacing:.3px;}
.fi{width:100%;padding:11px 13px;border:2px solid var(--bd);border-radius:10px;font-family:'Heebo',sans-serif;font-size:16px;color:var(--ch);background:white;transition:border-color .2s;direction:rtl;-webkit-appearance:none;}
.fi:focus{outline:none;border-color:var(--g);}
select.fi{cursor:pointer;}
.fita{width:100%;padding:10px 12px;border:2px solid var(--bd);border-radius:10px;font-family:'Heebo',sans-serif;font-size:16px;resize:none;direction:rtl;min-height:70px;background:white;color:var(--ch);}
.fita:focus{outline:none;border-color:var(--g);}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cc{font-size:10px;color:var(--cl);text-align:left;margin-top:2px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.bp{background:linear-gradient(135deg,#8b3a4a,#5c1a2a);color:white;}
.bp:active{opacity:.85;}
.bp:disabled{opacity:.4;cursor:not-allowed;}
.bs{background:var(--cr);color:var(--ch);border:2px solid var(--bd);}
.bs:active{background:var(--bd);}
.bg_{background:transparent;color:var(--cl);}
.bsm{padding:7px 12px;font-size:13px;border-radius:8px;}
.bxs{padding:4px 9px;font-size:11px;border-radius:6px;}
.w100{width:100%;}
.divider{border:none;border-top:1px solid var(--bd);margin:14px 0;}
.empty{text-align:center;padding:28px;color:var(--cl);font-size:13px;}
.ibox{border-radius:9px;padding:9px 12px;font-size:12px;}
.igold{background:#fff8e1;border:1px solid var(--gol);color:#7a5c1a;}
.igreen{background:#f0f8f6;border:1px solid #a8d0c8;color:var(--teal);}
.section-title{font-size:11px;font-weight:700;color:var(--cl);letter-spacing:.5px;margin-bottom:8px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ch);color:white;padding:11px 22px;border-radius:11px;font-size:13px;font-weight:600;z-index:9999;display:flex;align-items:center;gap:7px;box-shadow:0 6px 20px rgba(0,0,0,.2);white-space:nowrap;}
.mobnav{position:fixed;bottom:0;left:0;right:0;background:var(--ch);padding:8px 0 env(safe-area-inset-bottom, 10px);z-index:200;border-top:1px solid rgba(255,255,255,.08);}
.mobrow{display:flex;justify-content:space-around;}
.mobni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;cursor:pointer;color:rgba(255,255,255,.4);font-size:10px;font-weight:600;-webkit-tap-highlight-color:transparent;min-width:56px;}
.mobni.on{color:#f5c0c8;}
.mobnb{background:var(--ro);color:white;font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;margin-top:-2px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const THERAPISTS = ["בן ונגר","נטלי עליון","אופיר אבן","שרון הראל","שקד אטיאס","הילה גפני","אורי זוננפלד","חניתה אלון","שחף שגיא"];
const ROLES = [{v:"therapist",l:"מטפל.ת"},{v:"admin",l:"מנהל עמותה"},{v:"board",l:"ועד מנהל"}];

// ─── מבנה היררכי: מרחבים → מחלקות → אגפים ───────────────
const initOrgStructure = () => ({
  onboardingCount: 2,
  spaces: [
    {id:"s1", name:"מרכז רפואי איכילוב"},
  ],
  depts: [
    {id:"d1", spaceId:"s1", name:"המטולוגיה"},
    {id:"d2", spaceId:"s1", name:"אונקולוגיה"},
    {id:"d3", spaceId:"s1", name:"אונקולוגיה אורתופדית"},
  ],
  wards: [
    {id:"w1", deptId:"d1", name:"השתלות – קומה 9",   room:true},
    {id:"w2", deptId:"d1", name:"אשפוז ארוך – קומה 9",room:true},
    {id:"w3", deptId:"d1", name:"אשפוז יום",          room:false},
    {id:"w4", deptId:"d2", name:"אשפוז ארוך",         room:true},
    {id:"w5", deptId:"d2", name:"אשפוז יום",          room:false},
    {id:"w6", deptId:"d3", name:"אשפוז",              room:true},
  ],
  // users: שם + תפקיד
  users: [
    {name:"בן ונגר",       roles:["admin","therapist"]},
    {name:"נטלי עליון",    roles:["therapist","board"]},
    {name:"אופיר אבן",     roles:["therapist"]},
    {name:"שרון הראל",     roles:["therapist"]},
    {name:"שקד אטיאס",     roles:["therapist"]},
    {name:"הילה גפני",     roles:["therapist"]},
    {name:"אורי זוננפלד",  roles:["therapist"]},
    {name:"חניתה אלון",    roles:["board"]},
    {name:"שחף שגיא",      roles:["therapist"]},
  ],
});

// helpers — פועלים על org state
const getSpaces  = org => org.spaces;
const getDepts   = (org, spaceId) => org.depts.filter(d=>d.spaceId===spaceId);
const getWards   = (org, deptId)  => org.wards.filter(w=>w.deptId===deptId);
const wardById   = (org, wid)     => org.wards.find(w=>w.id===wid)||null;
const deptById   = (org, did)     => org.depts.find(d=>d.id===did)||null;
const spaceById  = (org, sid)     => org.spaces.find(s=>s.id===sid)||null;
const wardLabel  = (org, wid)     => {
  const w=wardById(org,wid); if(!w) return wid;
  const d=deptById(org,w.deptId); if(!d) return w.name;
  return `${d.name} – ${w.name}`;
};

// backward-compat: WARD_L and WARDS still used in some places — will be replaced gradually
const WARDS = [
  {v:"hemato_trans",l:"המטולוגיה – השתלות (קומה 9)",room:true},
  {v:"hemato_long",l:"המטולוגיה – אשפוז ארוך (קומה 9)",room:true},
  {v:"hemato_day",l:"המטולוגיה – אשפוז יום (קומה 10)",room:false},
  {v:"onco_day",l:"אונקולוגיה – אשפוז יום",room:false},
  {v:"onco_long",l:"אונקולוגיה – אשפוז ארוך",room:true},
];
const WARD_L = Object.fromEntries(WARDS.map(w=>[w.v,w.l]));
const TX_TYPES = ["מדיטציה / מיינדפולנס","שיחה","דמיון מודרך","הילינג","ליווי למוות","אחר"];
const TX_COLORS = {
  "מדיטציה / מיינדפולנס":{bg:"#e8f5ee",color:"#2d7a4a"},
  "שיחה":{bg:"#fff3cd",color:"#7a5c1a"},
  "דמיון מודרך":{bg:"#ffe8f3",color:"#8a3a6b"},
  "הילינג":{bg:"#fce4ec",color:"#b71c6a"},
  "ליווי למוות":{bg:"#ffffff", color:"#2c1a20", border:"#2c1a20"},
  "אחר":{bg:"#e8edf0",color:"#4a5e53"},
};
const HOSP_L={hemato_trans:"המטולוגיה – השתלות",hemato_long:"המטולוגיה – ארוך",hemato_day:"המטולוגיה – יום",onco_long:"אונקו׳ – ארוך",onco_day:"אונקו׳ – יום",palliative:"ליווי למוות",ended:"הסתיים"};

    srch:<svg {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,

  };
  return m[n]||null;
}

const HospBadge=({v})=>{const st={hemato_trans:{background:"#e8f5ee",color:"#2d7a4a"},hemato_long:{background:"#d8f0f8",color:"#1a6a8a"},hemato_day:{background:"#d0e8f5",color:"#2a6a8a"},onco_long:{background:"#ede4ff",color:"#6b3a8a"},onco_day:{background:"#ffe8f3",color:"#8a3a6b"},ended:{background:"#e8edf0",color:"#7a8a95"}};return <span className="bdg" style={st[v]||{}}>{HOSP_L[v]||v}</span>;};

const PayBadge=({v})=>{

function UserMenu({user,onLogout,onHistory}){

  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);

      </div>}
    </div>
  );
}

// ─── MINI BAR CHART ───────────────────────────────────────
function MiniBar({data, color="#8b3a4a", height=60}){
  const max=Math.max(...data.map(d=>d.v),1);
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:height+32}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div style={{fontSize:10,fontWeight:700,color:d.v>0?"var(--gd)":"var(--sl)",minHeight:14,textAlign:"center"}}>
            {d.v>0?d.v:""}
          </div>
          <div style={{width:"100%",background:color,borderRadius:"3px 3px 0 0",
            height:`${Math.max((d.v/max)*height*0.85,d.v>0?4:0)}px`,
            opacity:i===data.length-1?1:0.4+0.6*(i/data.length),transition:"height .3s"}}/>
          <div style={{fontSize:9,color:"var(--cl)",whiteSpace:"nowrap",textAlign:"center"}}>{d.l}</div>
        </div>
      ))}
    </div>
  );
}

// ─── DASHBOARD — THERAPIST ────────────────────────────────
function DashboardTherapist({patients, treatments, org}){
  const today=new Date().toLocaleDateString("he-IL",{weekday:"long",day:"numeric",month:"long"});

  // מטופלים ממתינים לטיפול, ממוינים — קודם אלה עם 0 טיפולים, אח"כ לפי תאריך ממתין (הישן ביותר ראשון)
  const waiting=patients.filter(p=>p.ts==="waiting"&&p.hosp!=="ended");
  const txCount=pid=>treatments.filter(t=>t.patientId===pid).length;
  const lastWaitingDate=p=>{
    const logs=(p.statusLog||[]).filter(e=>e.to==="waiting").sort((a,b)=>new Date(b.date)-new Date(a.date));
    return logs[0]?.date||p.statusLog?.[0]?.date||"";
  };
  const sorted=[...waiting].sort((a,b)=>{
    const aNew=txCount(a.id)===0;const bNew=txCount(b.id)===0;
    if(aNew&&!bNew) return -1;if(!aNew&&bNew) return 1;
    return new Date(lastWaitingDate(a))-new Date(lastWaitingDate(b));
  });

  // קיבוץ לפי מחלקה
  const byDept={};
  sorted.forEach(p=>{
    const w=wardById(org,p.wardId);
    const d=w?deptById(org,w.deptId):null;
    const key=d?d.name:"לא מוגדר";
    if(!byDept[key]) byDept[key]=[];
    byDept[key].push(p);
  });

  return(
    <div>
      <div className="ph"><div><div className="pt">דשבורד 👋</div><div className="pst">{today}</div></div></div>
      {waiting.length===0&&<div style={{textAlign:"center",padding:"40px 20px"}}>
        <div style={{fontSize:40,marginBottom:10}}>✨</div>
        <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>אין מטופלים הממתינים לטיפול</div>
        <div style={{fontSize:13,color:"var(--cl)"}}>כל המטופלים קיבלו טיפול</div>
      </div>}
      {Object.entries(byDept).map(([deptName,pats])=>(
        <div key={deptName} className="wblock">
          <div className="wtitle">🏥 {deptName}</div>
          {pats.map((p,i)=>{
            const txc=txCount(p.id);
            const isNew=txc===0;
            const w=wardById(org,p.wardId);
            const daysWaiting=lastWaitingDate(p)?daysDiff(lastWaitingDate(p)):0;
            return(
              <div key={p.id} className="wrow" style={isNew?{borderColor:"var(--go)",background:"#fffbf0"}:{}}>
                {isNew&&<div style={{width:6,background:"var(--go)",borderRadius:3,alignSelf:"stretch",marginRight:-4,marginLeft:6,flexShrink:0}}/>}
                <div className="pinit" style={{background:isNew?"var(--go)":`hsl(${i*55+140},45%,55%)`}}>{p.name[0]}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span className="pname">{p.name}</span>
                    {isNew&&<span className="bdg" style={{background:"var(--gol)",color:"#7a5c1a",fontSize:10}}>✨ חדש</span>}
                  </div>
                  {p.note&&<div className="pnote">{p.note}</div>}
                  <div style={{fontSize:10,color:"var(--cl)",marginTop:2}}>
                    {w?.name}{p.room?` · חדר ${p.room}`:""}
                    {daysWaiting>0?` · ממתין.ה ${daysWaiting} ימים`:""}
                  </div>
                </div>
                <div style={{textAlign:"left",flexShrink:0}}>
                  <div style={{fontSize:11,color:isNew?"var(--go)":"var(--cl)",fontWeight:700}}>{txc} טיפולים</div>
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ─── DASHBOARD — ADMIN ────────────────────────────────────
function DashboardAdmin({patients, treatments, shifts, payments, budget}){
  const today=new Date().toLocaleDateString("he-IL",{weekday:"long",day:"numeric",month:"long"});
  const now=new Date();

  const [therapistPeriod,setTherapistPeriod]=useState("month");
  const [selectedTherapist,setSelectedTherapist]=useState(null);
  const [patientPeriod,setPatientPeriod]=useState("all");
  const [openPatientFile,setOpenPatientFile]=useState(null);

  // helpers לתקופות
  const periodStart=(p)=>{
    const d=new Date(now);
    if(p==="week"){d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);return d;}
    if(p==="month") return new Date(now.getFullYear(),now.getMonth(),1);
    if(p==="prev")  return new Date(now.getFullYear(),now.getMonth()-1,1);
    if(p==="prev2") return new Date(now.getFullYear(),now.getMonth()-2,1);
    return new Date(0);
  };
  const periodEnd=(p)=>{
    if(p==="prev")  return new Date(now.getFullYear(),now.getMonth(),0);
    if(p==="prev2") return new Date(now.getFullYear(),now.getMonth()-1,0);
    return new Date(now.getFullYear(),now.getMonth()+1,0);
  };
  const inPeriod=(date,p)=>{
    const d=new Date(date);
    return d>=periodStart(p)&&d<=periodEnd(p);
  };
  const PERIOD_L={week:"השבוע",month:"החודש",prev:"חודש קודם",prev2:"לפני חודשיים"};

  // סטטיסטיקות בסיסיות
  const activePatients=patients.filter(p=>p.ts==="waiting"||p.ts==="palliative").length;
  const thisMonth=treatments.filter(t=>inPeriod(t.date,"month"));
  const activeTherapists=[...new Set(shifts.filter(s=>{const d=new Date(s.date);return(now-d)/864e5<=30;}).map(s=>s.therapist))].length;
  const totalMinutes=treatments.reduce((a,t)=>a+t.mins,0);

  // גרפים
  const weeklyData=Array.from({length:8},(_,i)=>{
    const d=new Date(now);d.setDate(d.getDate()-((7-i)*7));
    const end=new Date(d);end.setDate(end.getDate()+7);
    return {l:`${d.getDate()}/${d.getMonth()+1}`,v:treatments.filter(t=>{const td=new Date(t.date);return td>=d&&td<end;}).length};
  });
  const monthlyData=Array.from({length:6},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);
    return {l:d.toLocaleDateString("he-IL",{month:"short"}),v:treatments.filter(t=>{const td=new Date(t.date);return td.getMonth()===d.getMonth()&&td.getFullYear()===d.getFullYear();}).length};
  });

  // טבלת מטפלים לפי תקופה
  const therapistStats=[...new Set(treatments.map(t=>t.therapist))].map(name=>{
    const periodTx=treatments.filter(t=>t.therapist===name&&inPeriod(t.date,therapistPeriod));
    return {name,periodCount:periodTx.length,total:treatments.filter(t=>t.therapist===name).length};
  }).filter(t=>t.total>0).sort((a,b)=>b.periodCount-a.periodCount);

  // רשימת טיפולים של מטפל שנבחר
  const therapistTxs=selectedTherapist
    ?treatments.filter(t=>t.therapist===selectedTherapist&&inPeriod(t.date,therapistPeriod))
      .sort((a,b)=>new Date(b.date)-new Date(a.date))
    :[];

  // טבלת מטופלים לפי תקופה
  const patientStats=patients.map(p=>{
    const txs=patientPeriod==="all"
      ?treatments.filter(t=>t.patientId===p.id)
      :treatments.filter(t=>t.patientId===p.id&&inPeriod(t.date,patientPeriod));
    return {p,count:txs.length};
  }).filter(x=>x.count>0).sort((a,b)=>b.count-a.count).slice(0,8);

  return(
    <div>
      <div className="ph"><div><div className="pt">דשבורד מנהל</div><div className="pst">{today}</div></div></div>

      {/* ריבועי סטטיסטיקה */}
      <div className="sgrid">
        <div className="scard cgo"><div className="sv">{activePatients}</div><div className="slb">מטופלים פעילים</div></div>
        <div className="scard cgn"><div className="sv">{thisMonth.length}</div><div className="slb">טיפולים החודש</div></div>
        <div className="scard csk"><div className="sv">{activeTherapists}</div><div className="slb">מטפלים פעילים</div></div>
        <div className="scard crs"><div className="sv">{Math.round(totalMinutes/60)}</div><div className="slb">שעות טיפול סה״כ</div></div>
      </div>

      {/* גרף שבועי */}
      <div className="wblock">
        <div className="wtitle">📈 טיפולים לפי שבוע (8 שבועות אחרונים)</div>
        <MiniBar data={weeklyData} color="#8b3a4a" height={70}/>
      </div>

      {/* גרף חודשי */}
      <div className="wblock">
        <div className="wtitle">📊 טיפולים לפי חודש (6 חודשים אחרונים)</div>
        <MiniBar data={monthlyData} color="#4a8a7a" height={70}/>
      </div>

      {/* טבלת מטפלים */}
      <div className="wblock">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
          <div className="wtitle" style={{marginBottom:0}}>👩‍⚕️ פעילות מטפלים</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {Object.entries({all:"הכל",week:"מתחילת השבוע",month:"מתחילת החודש הנוכחי",prev:"חודש קודם",prev2:"לפני חודשיים"}).map(([v,l])=>(
              <button key={v} className={`btn bxs ${therapistPeriod===v?"bp":"bs"}`} style={{fontSize:10}}
                onClick={()=>{setTherapistPeriod(v);setSelectedTherapist(null);}}>
                {l}
              </button>
            ))}
          </div>
        </div>
        {therapistStats.map((t,i)=>(
          <div key={t.name}>
            <div onClick={()=>setSelectedTherapist(selectedTherapist===t.name?null:t.name)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid var(--bd)",cursor:"pointer",
                background:selectedTherapist===t.name?"var(--cr)":"transparent",borderRadius:selectedTherapist===t.name?8:0,paddingRight:selectedTherapist===t.name?8:0}}>
              <div style={{width:30,height:30,borderRadius:8,background:`hsl(${i*40+140},40%,55%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"white",flexShrink:0}}>{t.name[0]}</div>
              <div style={{flex:1,fontSize:13,fontWeight:600}}>{t.name}</div>
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:13,fontWeight:700,color:"var(--gd)"}}>{t.periodCount} {PERIOD_L[therapistPeriod]}</div>
              </div>
              <div style={{fontSize:12,color:"var(--cl)"}}>{selectedTherapist===t.name?"▲":"▼"}</div>
            </div>
            {/* היסטוריית טיפולים של מטפל */}
            {selectedTherapist===t.name&&(
              <div style={{background:"var(--cr)",borderRadius:10,padding:"10px 12px",margin:"4px 0 8px",border:"1px solid var(--bd)"}}>
                <div style={{fontSize:11,fontWeight:700,color:"var(--cl)",marginBottom:8}}>
                  {therapistTxs.length} טיפולים — {PERIOD_L[therapistPeriod]}
                </div>
                {therapistTxs.length===0
                  ?<div style={{fontSize:12,color:"var(--cl)"}}>אין טיפולים בתקופה זו</div>
                  :therapistTxs.map(tx=>(
                    <div key={tx.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--bd)",fontSize:12}}>
                      <div>
                        <span style={{fontWeight:600}}>{tx.patientName}</span>
                        <span style={{color:"var(--cl)",marginRight:6}}>{fmtDate(tx.date)}</span>
                      </div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end"}}>
                        {(tx.types||[]).map(tp=><TxBadge key={tp} type={tp}/>)}
                        <span style={{color:"var(--cl)",fontSize:11}}>{tx.mins} דק׳</span>
                      </div>
                    </div>
                  ))
                }
              </div>
            )}
          </div>
        ))}
        {therapistStats.length===0&&<div className="empty">אין נתונים</div>}
      </div>

      {/* טבלת מטופלים */}
      <div className="wblock">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
          <div className="wtitle" style={{marginBottom:0}}>💆 מטופלים (טיפולים)</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {[["all","הכל"],["week","מתחילת השבוע"],["month","מתחילת החודש הנוכחי"],["prev","חודש קודם"],["prev2","לפני חודשיים"]].map(([v,l])=>(
              <button key={v} className={`btn bxs ${patientPeriod===v?"bp":"bs"}`} style={{fontSize:10}}
                onClick={()=>setPatientPeriod(v)}>
                {l}
              </button>
            ))}
          </div>
        </div>
        {patientStats.length===0&&<div className="empty">אין טיפולים בתקופה זו</div>}
        {patientStats.map(({p,count},i)=>(
          <div key={p.id} onClick={()=>setOpenPatientFile(p)}
            style={{display:"flex",alignItems:"center",gap:8,padding:"8px 4px",borderBottom:i<patientStats.length-1?"1px solid var(--bd)":"none",cursor:"pointer"}}>
            <div style={{width:26,height:26,borderRadius:7,background:`hsl(${i*50+200},40%,60%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"white",flexShrink:0}}>{i+1}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600}}>{p.name}</div>
              {p.note&&<div style={{fontSize:10,color:"var(--cl)"}}>{p.note}</div>}
            </div>
            <div style={{fontWeight:700,fontSize:13,color:"var(--gd)"}}>{count} טיפולים</div>
            <div style={{fontSize:11,color:"var(--cl)"}}>›</div>
          </div>
        ))}
      </div>

      {/* תיק מטופל */}
      {openPatientFile&&(
        <PatientFile
          patient={openPatientFile}
          treatments={treatments}
          org={window.__org||{spaces:[],depts:[],wards:[]}}
          onClose={()=>setOpenPatientFile(null)}
          onUpdateStatus={()=>{}}
        />
      )}
    </div>
  );
}

// ─── DASHBOARD — BOARD ────────────────────────────────────
function DashboardBoard({patients, treatments, shifts, payments, budget, org}){
  const today=new Date().toLocaleDateString("he-IL",{weekday:"long",day:"numeric",month:"long"});
  const now=new Date();

  // תאריכים
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  const weekStart=new Date(now);weekStart.setDate(weekStart.getDate()-weekStart.getDay());weekStart.setHours(0,0,0,0);
  const monthLabel=monthStart.toLocaleDateString("he-IL",{month:"long",year:"numeric"});
  const weekLabel=weekStart.toLocaleDateString("he-IL",{day:"numeric",month:"numeric"});

  const totalTx=treatments.length;
  const totalPatients=patients.length;
  const totalHours=Math.round(treatments.reduce((a,t)=>a+t.mins,0)/60);
  const activeTherapists=(org?.users||[]).filter(u=>(u.roles||[u.role]).includes("therapist")).length;
  const onboarding=org?.onboardingCount||0;
  const avgPerHour=totalHours>0?Math.round(totalTx/totalHours*10)/10:0;
  const thisMonthTx=treatments.filter(t=>new Date(t.date)>=monthStart).length;
  const thisWeekTx=treatments.filter(t=>new Date(t.date)>=weekStart).length;

  const spent=payments.filter(p=>["transferred","receipt_sent","receipt_approved"].includes(p.status)).reduce((a,p)=>a+p.amount,0);
  const remaining=budget-spent;

  // גרף שבועי
  const weeklyData=Array.from({length:8},(_,i)=>{
    const d=new Date(now);d.setDate(d.getDate()-((7-i)*7));
    const end=new Date(d);end.setDate(end.getDate()+7);
    return {l:`${d.getDate()}/${d.getMonth()+1}`,v:treatments.filter(t=>{const td=new Date(t.date);return td>=d&&td<end;}).length};
  });

  // גרף חודשי
  const monthlyData=Array.from({length:6},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);
    return {l:d.toLocaleDateString("he-IL",{month:"short"}),v:treatments.filter(t=>{const td=new Date(t.date);return td.getMonth()===d.getMonth()&&td.getFullYear()===d.getFullYear();}).length};
  });

  // פעילות מטפלים + מטופלים — זהה לדשבורד מנהל
  const [therapistPeriod,setTherapistPeriod]=useState("month");
  const [selectedTherapist,setSelectedTherapist]=useState(null);
  const [patientPeriod,setPatientPeriod]=useState("all");
  const [openPatientFile,setOpenPatientFile]=useState(null);

  const periodStart=(p)=>{
    const d=new Date(now);
    if(p==="week"){d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);return d;}
    if(p==="month") return new Date(now.getFullYear(),now.getMonth(),1);
    if(p==="prev")  return new Date(now.getFullYear(),now.getMonth()-1,1);
    if(p==="prev2") return new Date(now.getFullYear(),now.getMonth()-2,1);
    return new Date(0);
  };
  const periodEnd=(p)=>{
    if(p==="prev")  return new Date(now.getFullYear(),now.getMonth(),0);
    if(p==="prev2") return new Date(now.getFullYear(),now.getMonth()-1,0);
    return new Date(now.getFullYear(),now.getMonth()+1,0);
  };
  const inPeriod=(date,p)=>{const d=new Date(date);return d>=periodStart(p)&&d<=periodEnd(p);};
  const PERIOD_L={all:"הכל",week:"מתחילת השבוע",month:"מתחילת החודש הנוכחי",prev:"חודש קודם",prev2:"לפני חודשיים"};

  const therapistStats=[...new Set(treatments.map(t=>t.therapist))].map(name=>{
    const periodTx=treatments.filter(t=>t.therapist===name&&inPeriod(t.date,therapistPeriod));
    return {name,periodCount:periodTx.length,total:treatments.filter(t=>t.therapist===name).length};
  }).filter(t=>t.total>0).sort((a,b)=>b.periodCount-a.periodCount);

  const therapistTxs=selectedTherapist
    ?treatments.filter(t=>t.therapist===selectedTherapist&&inPeriod(t.date,therapistPeriod)).sort((a,b)=>new Date(b.date)-new Date(a.date))
    :[];

  const patientStats=patients.map(p=>{
    const txs=patientPeriod==="all"?treatments.filter(t=>t.patientId===p.id):treatments.filter(t=>t.patientId===p.id&&inPeriod(t.date,patientPeriod));
    return {p,count:txs.length};
  }).filter(x=>x.count>0).sort((a,b)=>b.count-a.count).slice(0,8);

  return(
    <div>
      <div className="ph"><div><div className="pt">דשבורד</div><div className="pst">{today}</div></div></div>

      {/* מספרי אימפקט גדולים */}
      <div style={{background:"linear-gradient(150deg,#2c1a20,#8b3a4a)",borderRadius:16,padding:"20px",marginBottom:14,color:"white"}}>
        <div style={{fontSize:11,opacity:.6,marginBottom:14,letterSpacing:1}}>אימפקט מצטבר מאז הקמה</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {[
            [totalTx,"טיפולים ניתנו","💆"],
            [totalPatients,"מטופלים.ות","🏥"],
            [totalHours,"שעות טיפול","⏱"],
            [activeTherapists,"מטפלים.ות פעילים.ות","👩‍⚕️"],
            [avgPerHour,"טיפולים לשעה (ממוצע)","📊"],
            [onboarding,"מטפלים.ות בתהליך קליטה","🌱"],
          ].map(([v,l,ic])=>(
            <div key={l}>
              <div style={{fontSize:30,fontWeight:900,lineHeight:1}}>{v.toLocaleString()}</div>
              <div style={{fontSize:10,opacity:.7,marginTop:3}}>{ic} {l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* טיפולים החודש + השבוע */}
      <div className="sgrid" style={{marginBottom:14}}>
        <div className="scard cgo">
          <div className="sv">{remaining.toLocaleString()}</div>
          <div className="slb">יתרת תקציב (₪)</div>
        </div>
        <div className="scard cgn">
          <div className="sv">{thisMonthTx}</div>
          <div className="slb">טיפולים מתחילת החודש</div>
          <div style={{fontSize:9,color:"var(--cl)",marginTop:2}}>{monthLabel}</div>
        </div>
        <div className="scard csk">
          <div className="sv">{thisWeekTx}</div>
          <div className="slb">טיפולים מתחילת השבוע</div>
          <div style={{fontSize:9,color:"var(--cl)",marginTop:2}}>מ-{weekLabel}</div>
        </div>
      </div>

      {/* progress bar תקציב */}
      <div style={{background:"white",borderRadius:10,padding:"12px 14px",border:"1px solid var(--bd)",marginBottom:14,fontSize:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{color:"var(--cl)"}}>תקציב כולל</span><span style={{fontWeight:700}}>₪{budget.toLocaleString()}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{color:"var(--cl)"}}>שולם עד כה</span><span style={{fontWeight:700,color:"var(--ro)"}}>₪{spent.toLocaleString()}</span>
        </div>
        <div style={{background:"var(--bd)",borderRadius:20,height:6,overflow:"hidden"}}>
          <div style={{background:"linear-gradient(90deg,var(--g),var(--gl))",height:"100%",width:`${Math.min((spent/budget)*100,100)}%`,borderRadius:20}}/>
        </div>
        <div style={{fontSize:10,color:"var(--cl)",marginTop:4,textAlign:"left"}}>{Math.round((spent/budget)*100)}% נוצל</div>
      </div>

      {/* גרף שבועי */}
      <div className="wblock">
        <div className="wtitle">📈 טיפולים לפי שבוע (8 שבועות אחרונים)</div>
        <MiniBar data={weeklyData} color="#8b3a4a" height={70}/>
      </div>

      {/* גרף חודשי */}
      <div className="wblock">
        <div className="wtitle">📊 טיפולים לפי חודש (6 חודשים אחרונים)</div>
        <MiniBar data={monthlyData} color="#4a8a7a" height={70}/>
      </div>

      {/* פעילות מטפלים */}
      <div className="wblock">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
          <div className="wtitle" style={{marginBottom:0}}>👩‍⚕️ פעילות מטפלים</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {Object.entries(PERIOD_L).map(([v,l])=>(
              <button key={v} className={`btn bxs ${therapistPeriod===v?"bp":"bs"}`} style={{fontSize:10}}
                onClick={()=>{setTherapistPeriod(v);setSelectedTherapist(null);}}>{l}</button>
            ))}
          </div>
        </div>
        {therapistStats.map((t,i)=>(
          <div key={t.name}>
            <div onClick={()=>setSelectedTherapist(selectedTherapist===t.name?null:t.name)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid var(--bd)",cursor:"pointer",
                background:selectedTherapist===t.name?"var(--cr)":"transparent",borderRadius:selectedTherapist===t.name?8:0,paddingRight:selectedTherapist===t.name?8:0}}>
              <div style={{width:30,height:30,borderRadius:8,background:`hsl(${i*40+140},40%,55%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"white",flexShrink:0}}>{t.name[0]}</div>
              <div style={{flex:1,fontSize:13,fontWeight:600}}>{t.name}</div>
              <div style={{fontSize:13,fontWeight:700,color:"var(--gd)"}}>{t.periodCount} {PERIOD_L[therapistPeriod]}</div>
              <div style={{fontSize:12,color:"var(--cl)"}}>{selectedTherapist===t.name?"▲":"▼"}</div>
            </div>
            {selectedTherapist===t.name&&(
              <div style={{background:"var(--cr)",borderRadius:10,padding:"10px 12px",margin:"4px 0 8px",border:"1px solid var(--bd)"}}>
                <div style={{fontSize:11,fontWeight:700,color:"var(--cl)",marginBottom:8}}>{therapistTxs.length} טיפולים — {PERIOD_L[therapistPeriod]}</div>
                {therapistTxs.length===0?<div style={{fontSize:12,color:"var(--cl)"}}>אין טיפולים בתקופה זו</div>
                  :therapistTxs.map(tx=>(
                    <div key={tx.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--bd)",fontSize:12}}>
                      <div><span style={{fontWeight:600}}>{tx.patientName}</span><span style={{color:"var(--cl)",marginRight:6}}>{fmtDate(tx.date)}</span></div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end"}}>
                        {(tx.types||[]).map(tp=><TxBadge key={tp} type={tp}/>)}
                        <span style={{color:"var(--cl)",fontSize:11}}>{tx.mins} דק׳</span>
                      </div>
                    </div>
                  ))
                }
              </div>
            )}
          </div>
        ))}
        {therapistStats.length===0&&<div className="empty">אין נתונים</div>}
      </div>

      {/* מטופלים (טיפולים) */}
      <div className="wblock">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
          <div className="wtitle" style={{marginBottom:0}}>💆 מטופלים (טיפולים)</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {Object.entries(PERIOD_L).map(([v,l])=>(
              <button key={v} className={`btn bxs ${patientPeriod===v?"bp":"bs"}`} style={{fontSize:10}}
                onClick={()=>setPatientPeriod(v)}>{l}</button>
            ))}
          </div>
        </div>
        {patientStats.length===0&&<div className="empty">אין טיפולים בתקופה זו</div>}
        {patientStats.map(({p,count},i)=>(
          <div key={p.id} onClick={()=>setOpenPatientFile(p)}
            style={{display:"flex",alignItems:"center",gap:8,padding:"8px 4px",borderBottom:i<patientStats.length-1?"1px solid var(--bd)":"none",cursor:"pointer"}}>
            <div style={{width:26,height:26,borderRadius:7,background:`hsl(${i*50+200},40%,60%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"white",flexShrink:0}}>{i+1}</div>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{p.name}</div>{p.note&&<div style={{fontSize:10,color:"var(--cl)"}}>{p.note}</div>}</div>
            <div style={{fontWeight:700,fontSize:13,color:"var(--gd)"}}>{count} טיפולים</div>
            <div style={{fontSize:11,color:"var(--cl)"}}>›</div>
          </div>
        ))}
      </div>

      {openPatientFile&&(
        <PatientFile patient={openPatientFile} treatments={treatments} org={org||{spaces:[],depts:[],wards:[]}}
          onClose={()=>setOpenPatientFile(null)} onUpdateStatus={()=>{}}/>
      )}
    </div>
  );
}

// ─── DASHBOARD — router ───────────────────────────────────
function Dashboard({role, patients, treatments, shifts, payments, budget, org}){
  if(role==="therapist") return <DashboardTherapist patients={patients} treatments={treatments} org={org}/>;
  if(role==="admin")     return <DashboardAdmin patients={patients} treatments={treatments} shifts={shifts} payments={payments} budget={budget}/>;
  return <DashboardBoard patients={patients} treatments={treatments} shifts={shifts} payments={payments} budget={budget} org={org}/>;
}

function PatientFile({patient,treatments,onClose,onUpdateStatus,org}){
  const [tab,setTab]=useState("treatments");
  const ptx=treatments.filter(t=>t.patientId===patient.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const [newStatus,setNewStatus]=useState(patient.ts);
  const [statusNote,setStatusNote]=useState("");
  const [showSF,setShowSF]=useState(false);
  // עדכון מיקום
  const [showLocF,setShowLocF]=useState(false);
  const [locSpace,setLocSpace]=useState(patient.spaceId||"");
  const [locDept,setLocDept]=useState(patient.deptId||"");
  const [locWard,setLocWard]=useState(patient.wardId||"");
  const [locRoom,setLocRoom]=useState(patient.room||"");

  const avatarColor=`hsl(${(patient.id*55+140)%360},45%,55%)`;
  const txDot=type=>{const m={"מדיטציה / מיינדפולנס":"green","שיחה":"gold","דמיון מודרך":"sky","הילינג":"rose"};return m[type]||"gray";};

  // תווית מיקום נוכחי
  const curLocLabel = ()=>{
    if(patient.wardId&&org) return wardLabel(org,patient.wardId);
    return HOSP_L[patient.hosp]||patient.hosp||"—";
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="file-modal" onClick={e=>e.stopPropagation()}>
        <div className="file-header">
          <div className="file-header-top">
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div className="file-avatar" style={{background:avatarColor}}>{patient.name[0]}</div>
              <div>
                <div className="file-name">{patient.name}</div>
                <div className="file-meta">{patient.note&&`${patient.note} · `}{patient.gender}</div>
              </div>
            </div>
            <button style={{background:"none",border:"none",color:"rgba(255,255,255,.7)",fontSize:22,cursor:"pointer",padding:4}} onClick={onClose}>✕</button>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <span className="bdg" style={{background:"rgba(255,255,255,.2)",color:"white",fontSize:11}}>🏥 {curLocLabel()}</span>
            {patient.room&&<span className="bdg" style={{background:"rgba(255,255,255,.15)",color:"white"}}>חדר {patient.room}</span>}
            <TBadge v={patient.ts}/>
          </div>
        </div>
        <div className="file-tabs">
          {[["treatments","טיפולים"],["status","סטטוס ומיקום"],["info","פרטים"]].map(([v,l])=>(
            <div key={v} className={`ftab ${tab===v?"on":""}`} onClick={()=>setTab(v)}>{l}</div>
          ))}
        </div>
        <div className="file-body">

          {/* ── טיפולים ── */}
          {tab==="treatments"&&(()=>{
            if(ptx.length===0) return <div className="empty">אין טיפולים עדיין</div>;
            const totalTx=ptx.length;
            const sorted=[...ptx].sort((a,b)=>new Date(a.date)-new Date(b.date));
            const firstDate=new Date(sorted[0].date);
            const lastDate=new Date(sorted[sorted.length-1].date);
            // חישוב ממוצע רק אם יש יותר מטיפול אחד
            const spanDays=totalTx>1?Math.max(1,Math.round((lastDate-firstDate)/864e5)):null;
            const avgPerWeek=spanDays?Math.round((totalTx/spanDays)*7*10)/10:null;
            const avgPerMonth=spanDays?Math.round((totalTx/spanDays)*30*10)/10:null;
            const totalMins=ptx.reduce((a,t)=>a+t.mins,0);
            return(<>
              {/* תאריך ראשון ואחרון */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                <div style={{background:"linear-gradient(135deg,#e8f5ee,#d0ead8)",borderRadius:11,padding:"11px 13px",border:"1px solid #a8d0c8"}}>
                  <div style={{fontSize:10,color:"#2d7a4a",fontWeight:700,marginBottom:3}}>🌱 טיפול ראשון</div>
                  <div style={{fontSize:14,fontWeight:800,color:"#1a4a30"}}>{fmtDate(sorted[0].date)}</div>
                  <div style={{fontSize:11,color:"#2d7a4a",marginTop:2}}>לפני {daysDiff(sorted[0].date)} ימים</div>
                </div>
                <div style={{background:"linear-gradient(135deg,#f0e8f8,#e0d0f0)",borderRadius:11,padding:"11px 13px",border:"1px solid #c0a8e0"}}>
                  <div style={{fontSize:10,color:"#6b3a8a",fontWeight:700,marginBottom:3}}>✨ טיפול אחרון</div>
                  <div style={{fontSize:14,fontWeight:800,color:"#3a1a5a"}}>{fmtDate(sorted[sorted.length-1].date)}</div>
                  <div style={{fontSize:11,color:"#6b3a8a",marginTop:2}}>לפני {daysDiff(sorted[sorted.length-1].date)} ימים</div>
                </div>
              </div>
              {/* מספרים מסכמים */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
                <div style={{background:"var(--cr)",borderRadius:10,padding:"9px 10px",border:"1px solid var(--bd)",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:900,color:"var(--gd)"}}>{totalTx}</div>
                  <div style={{fontSize:10,color:"var(--cl)",marginTop:1}}>טיפולים סה״כ</div>
                </div>
                <div style={{background:"var(--cr)",borderRadius:10,padding:"9px 10px",border:"1px solid var(--bd)",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:900,color:"var(--sk)"}}>{avgPerWeek??<span style={{fontSize:14,color:"var(--cl)"}}>—</span>}</div>
                  <div style={{fontSize:10,color:"var(--cl)",marginTop:1}}>טיפולים לשבוע</div>
                </div>
                <div style={{background:"var(--cr)",borderRadius:10,padding:"9px 10px",border:"1px solid var(--bd)",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:900,color:"var(--ch)"}}>{avgPerMonth??<span style={{fontSize:14,color:"var(--cl)"}}>—</span>}</div>
                  <div style={{fontSize:10,color:"var(--cl)",marginTop:1}}>טיפולים לחודש</div>
                </div>
              </div>
              {/* ציר זמן */}
              <div className="timeline">{ptx.map(tx=>{
                const loc=tx.wardId&&org?wardLabel(org,tx.wardId):(WARD_L[tx.ward]||tx.ward||"");
                return(
                  <div className="tl-item" key={tx.id}>
                    <div className={`tl-dot ${txDot((tx.types||[tx.type])[0])}`}/>
                    <div className="tl-date">{fmtDate(tx.date)}</div>
                    <div className="tl-card">
                      <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:3}}>{(tx.types||[tx.type]).map(tp=><TxBadge key={tp} type={tp}/>)}</div>
                      <div className="tl-title">{tx.mins} דק׳</div>
                      {loc&&<div className="tl-sub">🏥 {loc}</div>}
                      <div className="tl-therapist">{tx.therapist}</div>
                      {tx.note&&<div className="tl-note">"{tx.note}"</div>}
                    </div>
                  </div>
                );
              })}</div>
            </>);
          })()}

          {/* ── סטטוס ומיקום ── */}
          {tab==="status"&&(
            <div>
              {/* עדכון סטטוס */}
              {!showSF
                ?<button className="btn bs bsm" onClick={()=>setShowSF(true)} style={{marginBottom:10}}>
                  <Ico n="ed" s={13}/> עדכן סטטוס
                </button>
                :<div className="card" style={{padding:14,marginBottom:12}}>
                  <div className="fg">
                    <div className="splbl">סטטוס טיפול</div>
                    <div className="spg">
                      {[["waiting","ממתין.ה לטיפול"],["not_receiving","לא מקבל.ת כרגע"],["palliative","ליווי למוות"],["ended","טיפול הסתיים"]].map(([v,l])=>{
                        const isSelected=newStatus===v;
                        const isPall=v==="palliative";
                        const selStyle=isSelected?(isPall?{background:"white",color:"#2c1a20",borderColor:"#2c1a20",borderWidth:2}:undefined):undefined;
                        return <div key={v} className={`sp ${isSelected&&!isPall?`s-${v}`:""}`} style={selStyle||{fontSize:12}} onClick={()=>setNewStatus(v)}>{l}</div>;
                      })}
                    </div>
                  </div>
                  <div className="fg"><label className="fl">הערה</label>
                    <input className="fi" value={statusNote} onChange={e=>setStatusNote(e.target.value)} placeholder="למה השתנה?"/>
                  </div>
                  <div style={{display:"flex",gap:7}}>
                    <button className="btn bs bsm" style={{flex:1}} onClick={()=>setShowSF(false)}>ביטול</button>
                    <button className="btn bp bsm" style={{flex:2}} onClick={()=>{

}

function PatientsPage({patients,setPatients,treatments,toast,org}){
  const [openFile,setOpenFile]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [spaceF,setSpaceF]=useState("");
  const [deptF,setDeptF]=useState("");
  const [wardF,setWardF]=useState("");

  const list=patients.filter(p=>{
    if(q&&!p.name.includes(q)&&!p.note.includes(q)) return false;
    if(wardF)  return p.wardId===wardF;
    if(deptF)  return org.wards.filter(w=>w.deptId===deptF).some(w=>w.id===p.wardId);
    if(spaceF) return org.depts.filter(d=>d.spaceId===spaceF).flatMap(d=>org.wards.filter(w=>w.deptId===d.id)).some(w=>w.id===p.wardId);
    return true;
  });
  const add=()=>{
    if(!np.name.trim()) return;
    const now=new Date().toISOString();
    const newP={...np,id:Date.now(),traits:np.traits||[],statusLog:[{date:now.split("T")[0],from:null,to:np.ts,note:"קליטה ראשונה"}],admissions:[{id:`a${Date.now()}`,from:now.split("T")[0],to:null,hosp:np.hosp,room:np.room}]};
    setPatients(p=>[...p,newP]);setNp({name:"",note:"",gender:"נקבה",hosp:"hemato_trans",room:"",ts:"waiting",traits:[]});setShowAdd(false);toast(`"${newP.name}" נוסף.ה`);
  };
  const updateStatus=(id, payload)=>{
    setPatients(ps=>ps.map(p=>{
      if(p.id!==id) return p;
      const today=new Date().toISOString().split("T")[0];
      if(payload.type==="status"){
        const entry={date:today,from:p.ts,to:payload.newTs,note:payload.note||""};
        return {...p,ts:payload.newTs,statusLog:[...(p.statusLog||[]),entry]};
      }
      if(payload.type==="location"){
        const entry={date:today,from:wardLabel(org,p.wardId)||p.hosp,to:wardLabel(org,payload.wardId)||"",note:"עדכון מיקום",kind:"location"};
        return {...p,
          spaceId:payload.spaceId, deptId:payload.deptId, wardId:payload.wardId,
          room:payload.room,
          statusLog:[...(p.statusLog||[]),entry]
        };
      }
      return p;
    }));
    toast("עודכן ✓");
  };
  const txCount=pid=>treatments.filter(t=>t.patientId===pid).length;
  const lastTx=pid=>{const arr=treatments.filter(t=>t.patientId===pid).sort((a,b)=>new Date(b.date)-new Date(a.date));return arr[0]?.date||null;};
  return(
    <div>
      <div className="ph"><div><div className="pt">מטופלים.ות</div><div className="pst">{patients.length} מטופלים</div></div><button className="btn bp bsm" onClick={()=>setShowAdd(true)}><Ico n="plus" s={14}/> חדש.ה</button></div>
      <div style={{marginBottom:12}}>
        <div className="srwrap" style={{marginBottom:8}}>
          <span className="sricon"><Ico n="srch" s={14}/></span>
          <input className="fi" style={{paddingRight:36}} placeholder="חפש.י שם..." value={q} onChange={e=>setQ(e.target.value)}/>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          <select className="fi fisn" value={spaceF} onChange={e=>{setSpaceF(e.target.value);setDeptF("");setWardF("");}}>
            <option value="">כל המרחבים</option>
            {org.spaces.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          {spaceF&&<select className="fi fisn" value={deptF} onChange={e=>{setDeptF(e.target.value);setWardF("");}}>
            <option value="">כל המחלקות</option>
            {getDepts(org,spaceF).map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
          </select>}
          {deptF&&<select className="fi fisn" value={wardF} onChange={e=>setWardF(e.target.value)}>
            <option value="">כל האגפים</option>
            {getWards(org,deptF).map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
          </select>}
        </div>
      </div>
      {list.map((p)=>{
        const txc=txCount(p.id);const lt=lastTx(p.id);
        return(
          <div key={p.id} onClick={()=>setOpenFile(p)} style={{background:"white",borderRadius:12,padding:"13px 15px",border:"2px solid var(--bd)",cursor:"pointer",marginBottom:10,boxShadow:"0 2px 8px var(--sh)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
              <div style={{width:38,height:38,borderRadius:9,background:`hsl(${(p.id*55+140)%360},45%,55%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"white",flexShrink:0}}>{p.name[0]}</div>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{p.name}</div>{p.note&&<div style={{fontSize:11,color:"var(--cl)"}}>{p.note}</div>}</div>
              <Ico n="folder" s={15} c="var(--cl)"/>
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}><HospBadge v={p.hosp}/><TBadge v={p.ts}/></div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--cl)",borderTop:"1px solid var(--bd)",paddingTop:7}}>
              <span>💆 {txc} טיפולים</span><span>{lt?fmtDate(lt):"לא טופל.ה"}</span>
            </div>
          </div>
        );
      })}
      {list.length===0&&<div className="empty">אין מטופלים</div>}

      {showAdd&&(
        <div className="overlay" onClick={()=>setShowAdd(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>

            <div className="ibox igold" style={{marginBottom:12}}>🔒 שם פרטי בלבד</div>
            <div className="fg"><label className="fl">שם פרטי *</label><input className="fi" value={np.name} onChange={e=>setNp({...np,name:e.target.value})} placeholder="שם פרטי"/></div>
            <div className="fg"><label className="fl">הערה מזהה</label><input className="fi" value={np.note} onChange={e=>setNp({...np,note:e.target.value})} placeholder='"כובע כחול"'/></div>
            <div className="fr2">
              <div className="fg"><label className="fl">מין</label><select className="fi" value={np.gender} onChange={e=>setNp({...np,gender:e.target.value})}><option>נקבה</option><option>זכר</option><option>אחר</option></select></div>
              {wardHasRoom(np.hosp)&&<div className="fg"><label className="fl">חדר</label><input className="fi" value={np.room} onChange={e=>setNp({...np,room:e.target.value})} placeholder="מס׳ חדר"/></div>}
            </div>
            <div className="fg"><div className="splbl">אשפוז</div><div className="spg">{[["hemato_trans","השתלות"],["hemato_long","אשפוז ארוך"],["hemato_day","יום"],["onco_long","אונקו׳ ארוך"],["onco_day","אונקו׳ יום"],["ended","הסתיים"]].map(([v,l])=><div key={v} className={`sp ${np.hosp===v?`s-${v}`:""}`} onClick={()=>setNp({...np,hosp:v,room:""})}>{l}</div>)}</div></div>
            <div className="fg"><div className="splbl">סטטוס</div><div className="spg">{[["waiting","ממתין.ה"],["not_receiving","לא מקבל.ת"]].map(([v,l])=><div key={v} className={`sp ${np.ts===v?`s-${v}`:""}`} onClick={()=>setNp({...np,ts:v})}>{l}</div>)}</div></div>

              <div className="spg">
                {[["יוצא.ת אתיופיה","#e8d5f5","#6b3a8a"],["מגזר חרדי","#fff8e1","#7a5c1a"],["מגזר ערבי","#e8f5ee","#2d7a4a"]].map(([t,bg,color])=>{
                  const sel=(np.traits||[]).includes(t);
                  return <div key={t} className="sp" style={sel?{background:bg,color,borderColor:color}:{}} onClick={()=>setNp(p=>({...p,traits:sel?(p.traits||[]).filter(r=>r!==t):[...(p.traits||[]),t]}))}>{t}</div>;

      )}
    </div>
  );
}

function JournalPage({treatments, org, role}){
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");
  const [spaceF,setSpaceF]=useState("");
  const [deptF,setDeptF]=useState("");
  const [wardF,setWardF]=useState("");
  const [showExport,setShowExport]=useState(false);

  const filtered=[...treatments].sort((a,b)=>new Date(b.date)-new Date(a.date)).filter(t=>{
    const d=new Date(t.date);
    if(dateFrom && d<new Date(dateFrom)) return false;
    if(dateTo   && d>new Date(dateTo+"T23:59:59")) return false;
    if(wardF && t.wardId!==wardF) return false;
    if(deptF && !wardF){
      const wardsInDept=org.wards.filter(w=>w.deptId===deptF).map(w=>w.id);
      if(!wardsInDept.includes(t.wardId)) return false;
    }
    if(spaceF && !deptF && !wardF){
      const deptsInSpace=org.depts.filter(d=>d.spaceId===spaceF).map(d=>d.id);
      const wardsInSpace=org.wards.filter(w=>deptsInSpace.includes(w.deptId)).map(w=>w.id);
      if(!wardsInSpace.includes(t.wardId)) return false;
    }
    return true;
  });

  const locLabel=t=>{
    if(t.wardId&&org){
      const w=wardById(org,t.wardId);const d=w?deptById(org,w.deptId):null;const s=d?spaceById(org,d.spaceId):null;
      if(w&&d&&s) return `${s.name} · ${d.name} · ${w.name}`;
      if(w&&d) return `${d.name} · ${w.name}`;
      if(w) return w.name;
    }
    return WARD_L[t.ward]||t.ward||"";
  };

  // ── תיאור הסינון הנוכחי לכותרת הדוח ──
  const filterDesc=()=>{
    const parts=[];
    if(dateFrom||dateTo) parts.push(`${dateFrom||"—"} עד ${dateTo||"—"}`);
    if(wardF)  parts.push(wardById(org,wardF)?.name||"");
    else if(deptF) parts.push(deptById(org,deptF)?.name||"");
    else if(spaceF) parts.push(spaceById(org,spaceF)?.name||"");
    return parts.length?parts.join(" | "):"כל הטיפולים";
  };

  // ── ייצוא טקסט ──
  const exportText=()=>{
    const header=`יומן טיפולים — ${filterDesc()}\n${new Date().toLocaleDateString("he-IL")}\n${"─".repeat(40)}\n`;
    const rows=filtered.map(t=>`${fmtDate(t.date)} | ${t.patientName} | ${t.therapist} | ${(t.types||[]).join(", ")} | ${t.mins} דק׳ | ${locLabel(t)}${t.note?` | "${t.note}"`:""}`)
      .join("\n");
    const footer=`\n${"─".repeat(40)}\nסה״כ: ${filtered.length} טיפולים`;
    const txt=header+rows+footer;
    const ta=document.createElement("textarea");ta.value=txt;ta.setAttribute("readonly","");ta.style.cssText="position:fixed;top:0;left:0;opacity:0;font-size:16px;";document.body.appendChild(ta);ta.focus();ta.select();const r=document.createRange();r.selectNodeContents(ta);const s=window.getSelection();s.removeAllRanges();s.addRange(r);ta.setSelectionRange(0,99999);try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);
    setShowExport(false);alert("הטקסט הועתק ✓\nהדבק בווטסאפ, מייל או כל מקום אחר.");
  };

  // ── ייצוא CSV ──
  const exportCSV=()=>{
    const header="תאריך,מטופל.ת,מטפל.ת,סוגי טיפול,משך (דק),מיקום,הערה\n";
    const rows=filtered.map(t=>[
      fmtDate(t.date),
      t.patientName,
      t.therapist,
      `"${(t.types||[]).join(", ")}"`,
      t.mins,
      `"${locLabel(t)}"`,
      `"${t.note||""}"`
    ].join(",")).join("\n");
    const bom="\uFEFF"; // BOM for Excel Hebrew support
    const blob=new Blob([bom+header+rows],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;
    a.download=`יומן_טיפולים_${new Date().toLocaleDateString("he-IL").replace(/\//g,"-")}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    setShowExport(false);
  };

  // ── ייצוא הדפסה/PDF ──
  const exportPrint=()=>{
    const rows=filtered.map(t=>`
      <tr>
        <td>${fmtDate(t.date)}</td>
        <td>${t.patientName}</td>
        <td>${t.therapist}</td>
        <td>${(t.types||[]).join(", ")}</td>
        <td>${t.mins} דק׳</td>
        <td>${locLabel(t)}</td>
        <td>${t.note||""}</td>
      </tr>`).join("");
    const html=`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"/>
      <title>יומן טיפולים</title>
      <style>
        body{font-family:Arial,sans-serif;direction:rtl;padding:24px;font-size:12px;}
        h2{margin-bottom:4px;font-size:16px;}
        .sub{color:#666;margin-bottom:16px;font-size:11px;}
        table{width:100%;border-collapse:collapse;}
        th{background:#2c1a20;color:white;padding:7px 10px;text-align:right;font-size:11px;}
        td{padding:7px 10px;border-bottom:1px solid #e8d0d5;font-size:11px;}
        tr:nth-child(even) td{background:#fdf6f0;}
        .footer{margin-top:16px;font-size:11px;color:#666;}
        @media print{button{display:none;}}
      </style></head><body>
      <h2>יומן טיפולים — שפת הסרטן</h2>
      <div class="sub">${filterDesc()} · הופק: ${new Date().toLocaleDateString("he-IL")}</div>
      <table>
        <thead><tr><th>תאריך</th><th>מטופל.ת</th><th>מטפל.ת</th><th>סוגי טיפול</th><th>משך</th><th>מיקום</th><th>הערה</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="footer">סה״כ: ${filtered.length} טיפולים</div>
      <br/><button onclick="window.print()">🖨️ הדפס / שמור PDF</button>
      </body></html>`;
    const win=window.open("","_blank");
    if(win){win.document.write(html);win.document.close();}
    setShowExport(false);
  };

  return(
    <div>
      <div className="ph">
        <div><div className="pt">יומן טיפולים</div><div className="pst">{filtered.length} טיפולים</div></div>
        {role==="admin"&&(
          <button className="btn bp bsm" onClick={()=>setShowExport(true)}>
            📊 הפק דוח
          </button>
        )}
      </div>

      {/* סינון תאריכים */}
      <div style={{background:"white",borderRadius:12,padding:"12px 14px",border:"1px solid var(--bd)",marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--cl)",marginBottom:8}}>טווח תאריכים</div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:120}}>
            <div style={{fontSize:10,color:"var(--cl)",marginBottom:3}}>מתאריך</div>
            <input type="date" className="fi fisn" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
          </div>
          <div style={{fontSize:13,color:"var(--cl)",paddingTop:16}}>—</div>
          <div style={{flex:1,minWidth:120}}>
            <div style={{fontSize:10,color:"var(--cl)",marginBottom:3}}>עד תאריך</div>
            <input type="date" className="fi fisn" value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
          </div>
          {(dateFrom||dateTo)&&(
            <button className="btn bs bxs" style={{marginTop:16}} onClick={()=>{setDateFrom("");setDateTo("");}}>נקה</button>
          )}
        </div>
        {/* קיצורים */}
        <div style={{display:"flex",gap:5,marginTop:8,flexWrap:"wrap"}}>
          {[
            ["שבוע אחרון",()=>{const t=new Date();const f=new Date(t);f.setDate(f.getDate()-6);setDateFrom(f.toISOString().split("T")[0]);setDateTo(t.toISOString().split("T")[0]);}],
            ["חודש אחרון",()=>{const t=new Date();const f=new Date(t);f.setDate(f.getDate()-29);setDateFrom(f.toISOString().split("T")[0]);setDateTo(t.toISOString().split("T")[0]);}],
            ["החודש",()=>{const t=new Date();const f=new Date(t.getFullYear(),t.getMonth(),1);setDateFrom(f.toISOString().split("T")[0]);setDateTo(t.toISOString().split("T")[0]);}],

          <option value="">כל המרחבים</option>

        {spaceF&&<select className="fi fisn" value={deptF} onChange={e=>{setDeptF(e.target.value);setWardF("");}}>

      {/* רשימת טיפולים */}
      {filtered.map(tx=>(
        <div key={tx.id} style={{background:"white",borderRadius:11,padding:"12px 14px",marginBottom:8,border:"1px solid var(--bd)"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>

          </div>
          <div style={{fontSize:11,color:"var(--sk)",fontWeight:600,marginBottom:4}}>🏥 {locLabel(tx)}</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>{(tx.types||[tx.type]).map(tp=><TxBadge key={tp} type={tp}/>)}</div>
          <div style={{fontSize:12,color:"var(--cl)"}}>{tx.therapist} · {tx.mins} דק׳</div>
          {tx.note&&<div style={{fontSize:12,fontStyle:"italic",color:"var(--ch)",marginTop:3}}>"{tx.note}"</div>}
        </div>
      ))}
      {filtered.length===0&&<div className="empty">אין טיפולים בטווח זה</div>}

      {/* ── מודל ייצוא דוח ── */}
      {showExport&&(
        <div className="overlay" onClick={()=>setShowExport(false)}>
          <div className="modal" style={{maxWidth:360}} onClick={e=>e.stopPropagation()}>
            <div className="mhead">
              <div className="mtitle">📊 הפקת דוח</div>
              <button style={{background:"none",border:"none",fontSize:20,color:"var(--cl)",cursor:"pointer"}} onClick={()=>setShowExport(false)}>✕</button>
            </div>
            <div style={{background:"var(--cr)",borderRadius:10,padding:"10px 14px",border:"1px solid var(--bd)",marginBottom:16}}>
              <div style={{fontSize:11,color:"var(--cl)",marginBottom:3}}>הדוח יכלול:</div>
              <div style={{fontWeight:700,fontSize:13}}>{filtered.length} טיפולים</div>
              <div style={{fontSize:11,color:"var(--cl)",marginTop:2}}>{filterDesc()}</div>
